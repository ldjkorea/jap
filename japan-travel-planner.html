function switchSchedType(type){
  ['sched','trans','meal','note'].forEach(id=>{
    const form=document.getElementById('sf-'+id+'-form');
    const btn=document.getElementById('sft-'+id);
    if(form) form.style.display=(id===type)?'':'none';
    if(btn){
      const on=id===type;
      btn.style.background=on?'var(--accent)':'var(--card)';
      btn.style.color=on?'#fff':'var(--text2)';
      btn.style.borderColor=on?'var(--accent)':'var(--border2)';
    }
  });
}

function selectMealType(k){
  window._calMealType=k;
  ['breakfast','lunch','dinner'].forEach(id=>{
    const btn=document.getElementById('mft-'+id);
    if(btn){ btn.className='chip'+(id===k?' active':''); }
  });
}

function saveMealFromCal(mid){
  const date=document.getElementById('mf-date')?.value||'';
  const content=document.getElementById('mf-content')?.value?.trim()||'';
  const mtype=window._calMealType||'dinner';
  if(!content){alert('내용을 입력해주세요!');return;}
  if(!state.data.meals) state.data.meals={};
  if(!state.data.meals[mid]) state.data.meals[mid]={};
  if(!state.data.meals[mid][date]) state.data.meals[mid][date]={b:'',l:'',d:''};
  const keyMap={breakfast:'b',lunch:'l',dinner:'d'};
  state.data.meals[mid][date][keyMap[mtype]]=content;
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById('body').innerHTML=renderPersonal(m);},260);
}

function saveNoteFromCal(mid){
  const date=document.getElementById('nof-date')?.value||'';
  const title=document.getElementById('nof-title')?.value?.trim()||'';
  const sh=parseInt(document.getElementById('nof-sh')?.value||9);
  const sm=parseInt(document.getElementById('nof-sm')?.value||0);
  const eh=parseInt(document.getElementById('nof-eh')?.value||sh+1);
  const em=parseInt(document.getElementById('nof-em')?.value||0);
  if(!title){alert('내용을 입력해주세요!');return;}
  if(!state.data.schedules) state.data.schedules={};
  if(!state.data.schedules[mid]) state.data.schedules[mid]={};
  if(!state.data.schedules[mid][date]) state.data.schedules[mid][date]=[];
  state.data.schedules[mid][date].push({
    id:uid(),title,startH:sh,startM:sm,endH:eh,endM:em,
    color:SCHED_COLORS[4]||'#888'
  });
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById('body').innerHTML=renderPersonal(m);},260);
}

function saveTransFromCal(mid){
  const date=document.getElementById('tf-date')?.value||'';
  const lineInfo=document.getElementById('tf-line')?.value?.trim()||'';
  const memo=document.getElementById('tf-memo')?.value?.trim()||'';
  const count=window._ptStopCount||2;
  const stops=[];
  for(let i=0;i<count;i++){
    const time=document.getElementById(`tf-stop-time-${i}`)?.value?.trim()||'';
    const station=document.getElementById(`tf-stop-station-${i}`)?.value?.trim()||'';
    if(station) stops.push({time,station,note:''});
  }
  if(stops.length<2){alert('출발지와 도착지를 입력해주세요!');return;}
  const item={id:uid(),date,type:_ptType,lineInfo,stops,memo,
    from:stops[0]?.station||'',to:stops[stops.length-1]?.station||'',
    time:stops[0]?.time||''};
  if(!state.data.personalTransport) state.data.personalTransport={};
  if(!state.data.personalTransport[mid]) state.data.personalTransport[mid]=[];
  state.data.personalTransport[mid].push(item);
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById('body').innerHTML=renderPersonal(m);},260);
}


function selectSchedColor(color,idx){
  _schedColor=color;
  SCHED_COLORS.forEach((_,i)=>{const b=document.getElementById("sc-clr-"+i);if(b)b.style.borderColor=i===idx?"#333":"transparent";});
}
function saveSchedule(mid,date,sid){
  // 팝업에서 날짜를 바꿀 수 있으므로 sf-date 우선
  const actualDate=getVal("sf-date")||date;
  const title=getVal("sf-title").trim()||"(제목 없음)";
  const startH=parseInt(getVal("sf-sh")),startM=parseInt(getVal("sf-sm")||"0");
  const endH=parseInt(getVal("sf-eh")),endM=parseInt(getVal("sf-em")||"0");
  if(endH*60+endM<=startH*60+startM){alert("종료 시간이 시작보다 빨라요!");return;}
  const ev={id:sid||uid(),title,startH,startM,endH,endM,color:_schedColor};
  if(!state.data.schedules)state.data.schedules={};
  if(!state.data.schedules[mid])state.data.schedules[mid]={};
  // 날짜 바꾼 경우 기존 날짜에서 제거
  if(sid&&date!==actualDate){
    state.data.schedules[mid][date]=(state.data.schedules[mid][date]||[]).filter(x=>x.id!==sid);
  }
  if(!state.data.schedules[mid][actualDate])state.data.schedules[mid][actualDate]=[];
  if(sid&&date===actualDate)
    state.data.schedules[mid][actualDate]=state.data.schedules[mid][actualDate].map(x=>x.id===sid?ev:x);
  else
    state.data.schedules[mid][actualDate]=[...state.data.schedules[mid][actualDate],ev];
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}
function deleteSchedule(mid,date,sid){
  if(!confirm("일정을 삭제할까요?"))return;
  state.data.schedules[mid][date]=(state.data.schedules[mid][date]||[]).filter(x=>x.id!==sid);
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}

// ── 일정 동기화 ──
function doSync_schedule(myMid, fromMid){
  const from=(state.data.schedules||{})[fromMid]||{};
  if(!state.data.schedules) state.data.schedules={};
  if(!state.data.schedules[myMid]) state.data.schedules[myMid]={};
  let n=0;
  Object.keys(from).forEach(date=>{
    if(!state.data.schedules[myMid][date]) state.data.schedules[myMid][date]=[];
    from[date].forEach(ev=>{
      const dup=state.data.schedules[myMid][date].some(e=>e.startH===ev.startH&&e.startM===ev.startM&&e.title===ev.title);
      if(!dup){ state.data.schedules[myMid][date].push({...ev,id:uid()}); n++; }
    });
  });
  _finishSync(myMid, `일정 ${n}개`);
}

// ── 숙소 동기화 ──
function doSync_hotel(myMid, fromMid){
  const fromM=state.data.members.find(x=>x.id===fromMid);
  const toIdx=state.data.members.findIndex(x=>x.id===myMid);
  if(!fromM||toIdx<0) return;
  const fromHotels=fromM.hotels||[];
  const myHotels=state.data.members[toIdx].hotels||[];
  let n=0;
  fromHotels.forEach(h=>{
    const dup=myHotels.some(e=>e.name===h.name&&e.checkin===h.checkin);
    if(!dup){ myHotels.push({...h,id:uid()}); n++; }
  });
  state.data.members[toIdx]={...state.data.members[toIdx],hotels:myHotels};
  _finishSync(myMid, `숙소 ${n}개`);
}

// ── 식사 동기화 ──
function doSync_meal(myMid, fromMid){
  const from=(state.data.meals||{})[fromMid]||{};
  if(!state.data.meals) state.data.meals={};
  if(!state.data.meals[myMid]) state.data.meals[myMid]={};
  let n=0;
  Object.keys(from).forEach(date=>{
    if(!state.data.meals[myMid][date]) state.data.meals[myMid][date]={b:"",l:"",d:""};
    const cur=state.data.meals[myMid][date];
    const src=from[date];
    if(!cur.b&&src.b){ cur.b=src.b; n++; }
    if(!cur.l&&src.l){ cur.l=src.l; n++; }
    if(!cur.d&&src.d){ cur.d=src.d; n++; }
  });
  _finishSync(myMid, `식사 ${n}건`);
}

// ── 경비 동기화 ──
function doSync_expense(myMid, fromMid){
  const fromExps=(state.data.expenses||[]).filter(e=>(e.memberIds||[]).includes(fromMid));
  if(!state.data.expenses) state.data.expenses=[];
  let n=0;
  fromExps.forEach(e=>{
    // 이미 내가 포함된 경비는 스킵
    if((e.memberIds||[]).includes(myMid)) return;
    // 같은 날짜+내용+금액이면 중복
    const dup=state.data.expenses.some(x=>x.date===e.date&&x.desc===e.desc&&x.amount===e.amount&&(x.memberIds||[]).includes(myMid));
    if(!dup){
      // 새 항목으로 복사 (나만 포함)
      state.data.expenses.push({...e, id:uid(), memberIds:[myMid], splitAmount:e.amount});
      n++;
    }
  });
  _finishSync(myMid, `경비 ${n}개`);
}

function _finishSync(myMid, msg){
  saveData(state.data);
  closeOverlay();
  alert(`✅ ${msg}을 동기화했어요!`);
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===myMid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}

let _ptDay = {}; // {mid: date}

function renderPersonalTransport(m){
  const memberDays=(m.start&&m.end)
    ? DAYS.filter(d=>d.num>=m.start&&d.num<=m.end) : DAYS;
  const selDate=_ptDay[m.id]||(memberDays[0]?.full)||DAYS[0].full;

  // 이 멤버의 교통편: 공통 교통편 + 개인 교통편
  const commonItems=(state.data.transport||[]).filter(t=>t.date===selDate);
  const personalItems=((state.data.personalTransport||{})[m.id]||[])
    .filter(t=>t.date===selDate);
  const allItems=[...commonItems.map(t=>({...t,_common:true})), ...personalItems]
    .sort((a,b)=>{
      const at=a.stops?.[0]?.time||a.time||"";
      const bt=b.stops?.[0]?.time||b.time||"";
      return at.localeCompare(bt);
    });

  const dayTabs=`<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px">
    ${memberDays.map(d=>{
      const hasItem=(state.data.transport||[]).some(t=>t.date===d.full)||
        ((state.data.personalTransport||{})[m.id]||[]).some(t=>t.date===d.full);
      return`<button class="chip${d.full===selDate?" active":""}" onclick="setPtDay('${m.id}','${d.full}')">
        ${d.num}일${hasItem?" ·":""}
      </button>`;
    }).join("")}
  </div>`;

  let listHtml="";
  if(allItems.length===0){
    listHtml=`<div class="empty" style="padding:16px 0">이 날 교통편이 없어요</div>`;
  } else {
    listHtml=`<div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)">`;
    allItems.forEach((t,i)=>{
      const ty=TRANSPORT_TYPES.find(x=>x.id===t.type)||TRANSPORT_TYPES[7];
      const isLast=i===allItems.length-1;
      const stops=t.stops||[];

      // 정류장 라인 렌더
      let stopsHtml="";
      if(stops.length>0){
        stopsHtml=`<div style="margin-top:6px;padding-left:4px">`;
        stops.forEach((s,si)=>{
          const isFirst=si===0, isLastStop=si===stops.length-1;
          const dotColor=isFirst?"var(--accent)":isLastStop?"var(--red)":"var(--text3)";
          stopsHtml+=`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:${isLastStop?0:4}px">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:2px">
              <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
              ${!isLastStop?`<div style="width:1.5px;height:12px;background:var(--border);margin-top:2px"></div>`:""}
            </div>
            <div style="flex:1;min-width:0;padding-bottom:${isLastStop?0:4}px">
              <div style="display:flex;align-items:baseline;gap:6px">
                <span style="font-size:12px;font-weight:900;color:var(--dark);flex-shrink:0">${s.time||"--:--"}</span>
                <span style="font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.station||"")}</span>
              </div>
              ${s.note?`<div style="font-size:10px;color:var(--text2);margin-top:1px">${esc(s.note)}</div>`:""}
            </div>
          </div>`;
        });
        stopsHtml+=`</div>`;
      } else {
        // 구형 데이터 (stops 없는 경우) fallback
        stopsHtml=`<div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(t.from||"")}${t.to?" → "+esc(t.to):""}</div>`;
      }

      const lineInfo=t.lineInfo?`<span style="font-size:10px;background:var(--bg2);border-radius:6px;padding:2px 7px;color:var(--text2);font-weight:700;margin-left:4px">${esc(t.lineInfo)}</span>`:"";

      listHtml+=`<div onclick="${t._common?"setSubTab('transport');setTab('overview')":"openEditPt('"+m.id+"','"+t.id+"')"}"
        style="padding:11px 14px;cursor:pointer;transition:background .12s;${!isLast?"border-bottom:1px solid var(--border);":""}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${stops.length>0?6:0}px">
          <span style="font-size:18px;flex-shrink:0">${ty.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
              <span style="font-size:13px;font-weight:800;color:var(--dark)">${esc(ty.label)}</span>
              ${lineInfo}
              ${t._common?`<span style="font-size:9px;color:var(--text3);background:var(--bg2);border-radius:4px;padding:1px 5px">공통</span>`:""}
            </div>
            ${t.memo?`<div style="font-size:11px;color:var(--text2);margin-top:1px">${esc(t.memo)}</div>`:""}
          </div>
          ${!t._common?`<span style="font-size:16px;color:var(--border2)">›</span>`:""}
        </div>
        ${stopsHtml}
      </div>`;
    });
    listHtml+=`</div>`;
  }

  return `
    ${sectionHeader("🚃","교통",allItems.length)}
    ${dayTabs}
    ${listHtml}
    <button class="btn-dash" style="margin-top:6px" onclick="openNewPt('${m.id}','${selDate}')">+ 교통편 추가</button>`;
}

let _ptType="train";
function _showPtForm(mid,date,t){
  const dayOpts=DAYS.map(d=>({v:d.full,l:'4/'+d.num+'('+d.day+')'}));
  const defStops=[{time:'',station:'',note:''},{time:'',station:'',note:''}];
  const def=t||{type:'train',lineInfo:'',stops:defStops,memo:''};
  _ptType=def.type||'train';
  window._ptStopCount=(def.stops||defStops).length;

  const typeChips=TRANSPORT_TYPES.map(ty=>{
    const active=_ptType===ty.id?' active':'';
    return `<button class="chip${active}" id="ptt-${ty.id}" onclick="selectPtType('${ty.id}')">${ty.icon} ${esc(ty.label)}</button>`;
  }).join('');

  const stopRows=(def.stops||defStops).map((s,i)=>{
    const isFirst=i===0;
    const isLast=i===(def.stops||defStops).length-1;
    const dotColor=isFirst?'var(--accent)':'var(--text3)';
    const ph=isFirst?'출발역/정류장':isLast?'도착역/정류장':'경유역';
    return '<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px" id="pt-stop-row-'+i+'">'+
      '<div style="flex-shrink:0"><div style="width:8px;height:8px;border-radius:50%;background:'+dotColor+'"></div></div>'+
      '<input class="inp" id="pt-stop-time-'+i+'" placeholder="09:30" value="'+esc(s.time||'')+'" style="width:72px;flex-shrink:0;padding:8px 8px;font-size:13px"/>'+
      '<input class="inp" id="pt-stop-station-'+i+'" placeholder="'+ph+'" value="'+esc(s.station||'')+'" style="flex:1;padding:8px 10px;font-size:13px"/>'+
      '</div>';
  }).join('');

  const formTitle = t ? '교통편 수정' : '교통편 추가';
  const saveBtnLabel = t ? '수정 완료' : '추가하기';
  const deleteBtn = t ? `<button class="btn-dng" onclick="deletePt('${mid}','${t.id}')">삭제</button>` : '';
  const ptId = t ? t.id : '';
  const dateOpts = dayOpts.map(o=>`<option value="${o.v}"${o.v===(date||def.date)?' selected':''}>${o.l}</option>`).join('');

  showOverlay(formTitle, `
    <div class="form-group"><label class="lbl">날짜</label>
      <select class="inp" id="pt-date">${dateOpts}</select>
    </div>
    <div class="form-group"><label class="lbl">종류</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${typeChips}</div>
    </div>
    ${inp('pt-line','노선·번호 (선택)',def.lineInfo||'','긴자선 · 야마노테선 · 100번 버스')}
    <div class="form-group"><label class="lbl">정류장 (출발 → 경유 → 도착)</label>
      <div id="pt-stops-wrap">${stopRows}</div>
      <button onclick="addPtStop()" style="border:none;background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;padding:4px 0">+ 경유지 추가</button>
    </div>
    ${inp('pt-memo','메모 (요금·소요시간 등)',def.memo||'','',true)}
    <button class="btn-pri" onclick="savePt('${mid}','${ptId}')">${saveBtnLabel}</button>
    ${deleteBtn}
  `);
}

function addPtStop(){
  window._ptStopCount=(window._ptStopCount||2)+1;
  const i=window._ptStopCount-1;
  const wrap=document.getElementById("pt-stops-wrap");
  if(!wrap) return;
  const div=document.createElement("div");
  div.id=`pt-stop-row-${i}`;
  div.style.cssText="display:flex;gap:6px;align-items:flex-start;margin-bottom:8px";
  div.innerHTML=`
    <div style="flex-shrink:0;padding-top:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--text3)"></div></div>
    <div style="flex:1;display:grid;grid-template-columns:70px 1fr;gap:6px">
      <input class="inp" id="pt-stop-time-${i}" placeholder="--:--" style="padding:8px 10px;font-size:13px"/>
      <input class="inp" id="pt-stop-station-${i}" placeholder="경유역/정류장" style="padding:8px 10px;font-size:13px"/>
    </div>`;
  wrap.appendChild(div);
  // 마지막 정류장 dot 색 업데이트
  for(let k=0;k<i;k++){
    const d=document.querySelector(`#pt-stop-row-${k} div div`);
    if(d) d.style.background=k===0?"var(--accent)":"var(--text3)";
  }
}

function selectPtType(id){
  _ptType=id;
  TRANSPORT_TYPES.forEach(ty=>{
    const btn=document.getElementById("ptt-"+ty.id);
    if(btn){ btn.className="chip"+(id===ty.id?" active":""); }
  });
}

function savePt(mid,tid){
  const date=getVal("pt-date");
  const lineInfo=getVal("pt-line").trim();
  const memo=getVal("pt-memo").trim();

  // 정류장 수집
  const stops=[];
  const count=window._ptStopCount||2;
  for(let i=0;i<count;i++){
    const time=document.getElementById(`pt-stop-time-${i}`)?.value?.trim()||"";
    const station=document.getElementById(`pt-stop-station-${i}`)?.value?.trim()||"";
    const note=document.getElementById(`pt-stop-note-${i}`)?.value?.trim()||"";
    if(station) stops.push({time,station,note});
  }
  if(stops.length<2){alert("출발지와 도착지를 입력해주세요!");return;}

  const item={id:tid||uid(),date,type:_ptType,lineInfo,stops,memo,
    // 하위 호환용
    from:stops[0]?.station||"",to:stops[stops.length-1]?.station||"",
    time:stops[0]?.time||""};

  if(!state.data.personalTransport) state.data.personalTransport={};
  if(!state.data.personalTransport[mid]) state.data.personalTransport[mid]=[];
  if(tid)
    state.data.personalTransport[mid]=state.data.personalTransport[mid].map(x=>x.id===tid?item:x);
  else
    state.data.personalTransport[mid]=[...state.data.personalTransport[mid],item];

  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}

function deletePt(mid,tid){
  if(!confirm("삭제할까요?"))return;
  state.data.personalTransport[mid]=(state.data.personalTransport[mid]||[]).filter(x=>x.id!==tid);
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}

let _mealDay = {}; // {mid: date}

function renderMealSection(m){
  const memberDays = (m.start&&m.end)
    ? DAYS.filter(d=>d.num>=m.start&&d.num<=m.end) : DAYS;
  const selDate = _mealDay[m.id] || (memberDays[0]?.full) || DAYS[0].full;

      const hasAny=dm.b||dm.l||dm.d;
      return `<button class="chip${d.full===selDate?" active":""}" onclick="setMealDay('${m.id}','${d.full}')">
        ${d.num}일${hasAny?` ✓`:""}

  const MEALS = [
    {key:"b", icon:"🌅", label:"조식"},
    {key:"l", icon:"☀️", label:"중식"},
    {key:"d", icon:"🌙", label:"석식"},
  ];

  const rows = MEALS.map(({key,icon,label})=>{
    const mv=dayMeals[key];
    const isObj=mv&&typeof mv==='object';
    const textVal=isObj?mv.text:(mv||'');
    const mealDef={b:{sh:7,sm:30,eh:8,em:30},l:{sh:12,sm:0,eh:13,em:0},d:{sh:18,sm:30,eh:19,em:30}};
    const def=mealDef[key];
    const sh=isObj&&mv.sh!=null?mv.sh:def.sh;
    const sm=isObj&&mv.sm!=null?mv.sm:def.sm;
    const eh=isObj&&mv.eh!=null?mv.eh:def.eh;
    const em=isObj&&mv.em!=null?mv.em:def.em;
    const hours=Array.from({length:CAL_HOUR_END-CAL_HOUR_START+1},(_,i)=>i+CAL_HOUR_START);
    const mins=[0,15,30,45];
    const hOpt=(sel)=>hours.map(h=>`<option value="${h}"${h===sel?" selected":""}>${String(h>=24?h-24:h).padStart(2,"0")}</option>`).join("");
    const mOpt=(sel)=>mins.map(mm=>`<option value="${mm}"${mm===sel?" selected":""}>${String(mm).padStart(2,"0")}</option>`).join("");
    return `
    <div style="padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:5px">
        <div style="flex-shrink:0;width:44px;padding-top:2px">

            color:var(--dark);resize:none;outline:none;line-height:1.5;padding:0;min-height:20px;"
          placeholder="${label} 미정"
          rows="1"
          oninput="autoResize(this);saveMealText('${m.id}','${selDate}','${key}',this.value)"
        >${esc(textVal)}</textarea>
      </div>
      <div style="display:flex;align-items:center;gap:4px;padding-left:54px">
        <span style="font-size:10px;color:var(--text3);font-weight:600">시작</span>
        <select style="border:1px solid var(--border);border-radius:6px;padding:2px 4px;font-size:11px;background:var(--card);color:var(--dark);font-family:inherit"
          onchange="saveMealTime('${m.id}','${selDate}','${key}','sh',Number(this.value))">${hOpt(sh)}</select>
        <select style="border:1px solid var(--border);border-radius:6px;padding:2px 4px;font-size:11px;background:var(--card);color:var(--dark);font-family:inherit"
          onchange="saveMealTime('${m.id}','${selDate}','${key}','sm',Number(this.value))">${mOpt(sm)}</select>
        <span style="font-size:10px;color:var(--text3);font-weight:600;margin-left:4px">종료</span>
        <select style="border:1px solid var(--border);border-radius:6px;padding:2px 4px;font-size:11px;background:var(--card);color:var(--dark);font-family:inherit"
          onchange="saveMealTime('${m.id}','${selDate}','${key}','eh',Number(this.value))">${hOpt(eh)}</select>
        <select style="border:1px solid var(--border);border-radius:6px;padding:2px 4px;font-size:11px;background:var(--card);color:var(--dark);font-family:inherit"
          onchange="saveMealTime('${m.id}','${selDate}','${key}','em',Number(this.value))">${mOpt(em)}</select>
      </div>
    </div>`;
  }).join("");

  return `

let _mealTimer={};

function saveCalNote(mid, pos, date, val){
  if(!state.data.calNotes) state.data.calNotes={};
  if(!state.data.calNotes[mid]) state.data.calNotes[mid]={top:{},bot:{}};
  if(!state.data.calNotes[mid][pos]) state.data.calNotes[mid][pos]={};
  state.data.calNotes[mid][pos][date]=val;
  const k="note-"+mid+pos+date;
  if(_mealTimer[k]) clearTimeout(_mealTimer[k]);
  _mealTimer[k]=setTimeout(()=>{ saveData(state.data); },800);
}
function _getMealObj(mid,date,key){
  if(!state.data.meals) state.data.meals={};
  if(!state.data.meals[mid]) state.data.meals[mid]={};
  if(!state.data.meals[mid][date]) state.data.meals[mid][date]={};
  const cur=state.data.meals[mid][date][key];
  const defs={b:{sh:7,sm:30,eh:8,em:30},l:{sh:12,sm:0,eh:13,em:0},d:{sh:18,sm:30,eh:19,em:30}};
  const def=defs[key]||{sh:8,sm:0,eh:9,em:0};
  if(!cur||typeof cur==='string') return {text:cur||'',sh:def.sh,sm:def.sm,eh:def.eh,em:def.em};
  return cur;
}
function saveMealText(mid,date,key,val){
  const obj=_getMealObj(mid,date,key);
  obj.text=val;
  state.data.meals[mid][date][key]=obj;
  const k=mid+date+key;
  if(_mealTimer[k]) clearTimeout(_mealTimer[k]);
  _mealTimer[k]=setTimeout(()=>{ saveData(state.data); delete _mealTimer[k]; },800);
}
function saveMealTime(mid,date,key,field,val){
  const obj=_getMealObj(mid,date,key);
  obj[field]=val;
  state.data.meals[mid][date][key]=obj;
  saveData(state.data);
}
function saveMeal(mid,date,key,val){ saveMealText(mid,date,key,val); }

let _hotelDayFilter = {}; // {mid: "all"|date}

function renderHotelSection(m){
  const hotels = m.hotels||[];
  const filter = _hotelDayFilter[m.id]||"all";

  // 멤버 여행 기간 내 날짜 목록
  const memberDays = (m.start&&m.end)
    ? DAYS.filter(d=>d.num>=m.start&&d.num<=m.end)
    : [];
  if(memberDays.length===0){
    return `${sectionHeader("🏨","숙소",hotels.length)}
      <div class="empty" style="padding:14px 0">
        날짜를 먼저 설정해주세요<br>
        <button class="btn-dash" style="margin-top:8px" onclick="openMemberEdit('${m.id}')">✏️ 날짜 설정하기</button>
      </div>
      <button class="btn-dash" onclick="openNewHotel('${m.id}')">+ 직접 입력</button>
      <button class="btn-paste" style="margin-top:6px" onclick="openNewHotel('${m.id}')">📋 숙소 추가</button>`;
  }

  // 날짜 탭
  let tabHtml = `<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px">
    <button class="chip${filter==="all"?" active":""}" onclick="setHotelFilter('${m.id}','all')">전체</button>
    ${memberDays.map(d=>`<button class="chip${filter===d.full?" active":""}" onclick="setHotelFilter('${m.id}','${d.full}')">${d.num}일</button>`).join("")}
  </div>`;

  // 필터링: 날짜 선택 시 체크인~체크아웃 포함된 숙소
  // 체크인 날짜순 정렬
  const sortedHotels = [...hotels].sort((a,b)=>{
    const aDay = a.checkinDay || (a.checkin?.match(/4\/(\d+)/)?parseInt(a.checkin.match(/4\/(\d+)/)[1]):99);
    const bDay = b.checkinDay || (b.checkin?.match(/4\/(\d+)/)?parseInt(b.checkin.match(/4\/(\d+)/)[1]):99);
    return aDay - bDay;
  });
  let shown = sortedHotels;
  if(filter!=="all"){
    const fDate = new Date(filter);
    shown = sortedHotels.filter(h=>{
      if(!h.checkin) return false;
      // checkin 문자열에서 날짜 파싱 (4/14, 4/14 15:00 등)
      const ciMatch = h.checkin.match(/(\d+)\/(\d+)/);
      const coMatch = h.checkout?.match(/(\d+)\/(\d+)/);
      if(!ciMatch) return true; // 날짜 불명확하면 전체에 표시
      const ci = new Date(2026, parseInt(ciMatch[1])-1, parseInt(ciMatch[2]));
      const co = coMatch ? new Date(2026, parseInt(coMatch[1])-1, parseInt(coMatch[2])) : ci;
      return fDate >= ci && fDate <= co;
    });
  }

  let listHtml = shown.length===0
    ? `<div class="empty" style="padding:14px 20px"><div style="margin-bottom:4px;opacity:0.5">${JAPAN_SVG.torii}</div>해당 날짜 숙소가 없어요</div>`
    : shown.map(h=>`<div class="list-item" onclick="openEditHotel('${m.id}','${h.id}')">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">🏨 ${esc(h.name)}</div>
          ${(h.checkin||h.checkout)?`<div style="font-size:12px;color:var(--text2);margin-top:2px">${esc([h.checkin,h.checkout].filter(Boolean).join(" → "))}</div>`:""}
          <div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap">
            ${h.price>0?`<span style="font-size:11px;color:var(--accent);font-weight:700">${fmtAmt(h.price,h.currency||"jpy")}</span>`:""}
            ${h.cancelBy?`<span style="font-size:11px;color:var(--text3)">취소: ${esc(h.cancelBy)}</span>`:""}
          </div>
        </div><span style="color:var(--border2);font-size:18px">›</span>
      </div>`).join("");

  const hasPasteHotel = hotels.length>0; // 이미 숙소 있으면 버튼 표시 유지

  // 선택된 날짜의 개인 일정도 표시
  let schedHtml="";
  if(filter!=="all"){
    const dayScheds=((state.data.schedules||{})[m.id]||{})[filter]||[];

    // 공통 교통편
    const commonTrans2=(state.data.transport||[]).filter(t=>t.date===filter).map(t=>{
      const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type);
      const sh=t.time?parseInt(t.time.split(':')[0])||9:9;
      const sm=t.time?parseInt(t.time.split(':')[1])||0:0;
      const fromN=(t.from||'').replace(/역$|駅$/,'');
      const toN=(t.to||'').replace(/역$|駅$/,'');
      return {id:'ct-'+t.id,title:fromN&&toN?fromN+' → '+toN:(t.from||'이동'),startH:sh,startM:sm,color:'#888'};
    });

    // 개인 교통편
    const personalTrans2=((state.data.personalTransport||{})[m.id]||[]).filter(t=>t.date===filter).map(t=>{
      const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type)||{icon:'🚃'};
      const stops=t.stops||[];
      const first=stops[0], last=stops[stops.length-1];
      const sh=first?.time?parseInt(first.time.split(':')[0])||9:9;
      const sm=first?.time?parseInt(first.time.split(':')[1])||0:0;
      const fromN=(first?.station||t.from||'').replace(/역$|駅$/,'');
      const toN=(last?.station||t.to||'').replace(/역$|駅$/,'');
      return {id:'pt2-'+t.id,title:fromN&&toN?fromN+' → '+toN:(t.lineInfo||'이동'),startH:sh,startM:sm,color:'#7B6FA0'};
    });

    // 식사
    const mealItems2=[];
    const dm=((state.data.meals||{})[m.id]||{})[filter]||{};
    const mealDef2={b:{sh:7,sm:30,label:'조식',color:'#E8A87C'},l:{sh:12,sm:0,label:'중식',color:'#E8A87C'},d:{sh:18,sm:30,label:'석식',color:'#C8956C'}};
    ['b','l','d'].forEach(k=>{
      const mv=dm[k]; if(!mv) return;
      const isObj=typeof mv==='object';
      const text=isObj?mv.text:mv; if(!text) return;
      const def=mealDef2[k];
      mealItems2.push({id:'ml2-'+k,title:def.label+' '+text,startH:isObj&&mv.sh!=null?mv.sh:def.sh,startM:isObj&&mv.sm!=null?mv.sm:0,color:def.color});
    });

    const allScheds=[...dayScheds,...commonTrans2,...personalTrans2,...mealItems2];
    if(allScheds.length>0){
      const sorted=[...allScheds].filter(ev=>ev.startH!=null).sort((a,b)=>a.startH*60+(a.startM||0)-(b.startH*60+(b.startM||0)));
      schedHtml=`<div style="margin-top:10px;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.3px">📅 해당일 일정</div>
        ${sorted.map(ev=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          <div style="width:8px;height:8px;border-radius:50%;background:${ev.color||"#888"};flex-shrink:0"></div>
          <span style="font-size:12px;color:var(--text2);font-weight:600;flex-shrink:0">${String(ev.startH).padStart(2,"0")}:${String(ev.startM||0).padStart(2,"0")}</span>
          <span style="font-size:13px;font-weight:600;color:var(--dark)">${esc(ev.title)}</span>
        </div>`).join("")}
        ${(state.data.transport||[]).filter(t=>t.date===filter).map(t=>{const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type);return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);opacity:.7">
          <span style="font-size:13px">${ty?.icon||"🚗"}</span>
          <span style="font-size:12px;color:var(--text2);font-weight:600">${esc(t.from||"")} → ${esc(t.to||"")}</span>
          ${t.time?`<span style="font-size:11px;color:var(--text3);margin-left:auto">${esc(t.time)}</span>`:""}
        </div>`;}).join("")}
      </div>`;
    }
  }

  return `
    ${sectionHeader("🏨","숙소",hotels.length)}
    ${tabHtml}
    ${listHtml}
    ${schedHtml}
    <button class="btn-dash" onclick="openNewHotel('${m.id}')" style="margin-top:4px">+ 숙소 추가</button>`;
}

}

function renderMemberExpenseSummary(mid){
  const m = state.data.members.find(x=>x.id===mid);
  const expenses = (state.data.expenses||[]).filter(e=>(e.memberIds||[]).includes(mid));

  // 합계 계산
  const totals={jpy:0,krw:0,usd:0};
  expenses.forEach(e=>{ totals[e.currency]=(totals[e.currency]||0)+e.splitAmount; });
  const hasAny = Object.values(totals).some(v=>v>0);

  // 원화 환산
  function toKrwLocal(byCur){
    const r=fxState.rates; let t=byCur.krw||0;
    if(r){ t+=(byCur.jpy||0)*(r.krwJpy/100); t+=(byCur.usd||0)*r.krwUsd; }
    return Math.round(t);
  }
  const totalKrw = toKrwLocal(totals);
  const curParts = CURRENCIES.filter(c=>totals[c.id]>0)
    .map(c=>`<span class="exp-sum-cur">${fmtAmt(totals[c.id],c.id)}</span>`).join("");

  // 날짜·시간순 정렬
  const sorted=[...expenses].sort((a,b)=>a.date.localeCompare(b.date)||( a.time||"").localeCompare(b.time||""));

  // 날짜별 그룹
  const byDate={};
  sorted.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });

  // 날짜별 그룹 → 지출탭과 동일한 카드 스타일
  let dateCards="";
  Object.keys(byDate).sort().forEach(date=>{
    const d=DAYS.find(x=>x.full===date);
    const dayLabel=d?`4/${d.num}일 (${d.day})`:date;
    const dayTotal={jpy:0,krw:0,usd:0};
    byDate[date].forEach(e=>{ dayTotal[e.currency]=(dayTotal[e.currency]||0)+e.splitAmount; });
    const dayTotStr=CURRENCIES.filter(c=>dayTotal[c.id]>0).map(c=>fmtAmt(dayTotal[c.id],c.id)).join(" + ");
    const dayItems=byDate[date];

    dateCards+=`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 2px">
        <span style="font-size:12px;font-weight:800;color:var(--dark)">${dayLabel}</span>
        <span style="font-size:11px;font-weight:700;color:var(--accent)">${dayTotStr}</span>
      </div>
      <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)">`;

    dayItems.forEach((e,i)=>{
      const n=(e.memberIds||[]).length;
      const isSplit=n>1;
      const krwNote=expKrwNote(e.splitAmount,e.currency);
      const isLast=i===dayItems.length-1;
      dateCards+=`<div onclick="openEditExpense('${e.id}')"
        style="display:flex;align-items:center;gap:10px;padding:11px 14px;
          cursor:pointer;transition:background .12s;
          ${!isLast?"border-bottom:1px solid var(--border);":""}">
        <div style="flex-shrink:0;min-width:72px">
          <div style="font-size:15px;font-weight:900;color:var(--dark);line-height:1.2">${fmtAmt(e.splitAmount,e.currency)}</div>
          ${krwNote?`<div style="font-size:10px;color:#2D6A4F;font-weight:700">${krwNote}</div>`:""}
          ${isSplit?`<div style="font-size:10px;color:var(--text3)">1/${n} 분담</div>`:""}
        </div>
        <div style="width:1px;height:34px;background:var(--border);flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.desc)}</div>
          ${e.time?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${e.time}</div>`:""}
        </div>
        <span style="font-size:16px;color:var(--border2);flex-shrink:0">›</span>
      </div>`;
    });
    dateCards+=`</div></div>`;
  });

  return `
    ${sectionHeader("💰","내 사용 경비", expenses.length)}
    <div class="exp-sum-card" style="cursor:default;margin-bottom:12px">
      <div class="exp-sum-label">나의 합계</div>
      <div class="exp-sum-body">
        <div class="exp-sum-curs">${hasAny?curParts:'<span class="exp-sum-cur" style="color:var(--text3)">0</span>'}</div>
        <div class="exp-sum-krw">${hasAny&&fxState.rates?"≈ ₩"+totalKrw.toLocaleString("ko-KR"):(hasAny?"환율 로딩 중":"")}</div>
      </div>
    </div>
    ${expenses.length===0
      ? `<div class="empty" style="padding:16px 0">아직 경비가 없어요<br><span style="font-size:12px;color:var(--text3)">지출 탭에서 입력해보세요</span></div>`
      : dateCards
    }
    <button class="btn-dash" onclick="setTab('expense')" style="margin-top:4px">+ 지출 탭에서 추가</button>`;
}

function showHotelForm(mid,h){

  const curOpts=CURRENCIES.map(c=>({v:c.id,l:c.label}));

      <div>${inp("hf-price","예약 가격",defaults.price,"0")}</div>
      <div><label class="lbl">단위</label>
        <select class="inp" id="hf-cur">
          ${curOpts.map(o=>`<option value="${o.v}"${o.v===(defaults.currency||"jpy")?" selected":""}>${o.l}</option>`).join("")}
        </select></div>
    </div>
    ${inp("hf-memo","메모 (주소·예약번호·기타)",defaults.memo,"",true)}
    <button class="btn-pri" onclick="saveHotel('${mid}','${h?h.id:""}')">${h?"수정 완료":"추가"}</button>
    ${h?`<button class="btn-dng" onclick="deleteHotel('${mid}','${h.id}')">삭제</button>`:""}`);
}
function saveHotel(mid,hid){
  const name=getVal("hf-name");if(!name.trim()){alert("숙소명을 입력해주세요!");return;}
  const ciDay=parseInt(getVal("hf-ci")||"0");
  const coDay=parseInt(getVal("hf-co")||"0");
  const price=parseFloat(getVal("hf-price")||"0")||0;
  const currency=getVal("hf-cur")||"jpy";
  const checkin=ciDay?`4/${ciDay}(${DAYS.find(d=>d.num===ciDay)?.day||""}) 15:00`:"";
  const checkout=coDay?`4/${coDay}(${DAYS.find(d=>d.num===coDay)?.day||""}) 11:00`:"";
  const h={id:hid||uid(),name:name.trim(),
    checkinDay:ciDay,checkoutDay:coDay,checkin,checkout,
    cancelBy:getVal("hf-cancel"),price,currency,memo:getVal("hf-memo")};
  state.data.members=state.data.members.map(m=>{
    if(m.id!==mid)return m;
    const hotels=m.hotels||[];
    return{...m,hotels:hid?hotels.map(x=>x.id===hid?h:x):[...hotels,h]};
  });
  // 예약가격 > 0이면 지출 자동 등록
  if(price>0 && !hid){
    const expDate=ciDay?`2026-04-${String(ciDay).padStart(2,"0")}`:todayDate();
    const exp={id:uid(),date:expDate,time:"",
      desc:`🏨 ${name.trim()} 숙박비`,amount:price,currency,
      memberIds:[mid],splitAmount:price};
    if(!state.data.expenses) state.data.expenses=[];
    state.data.expenses=[...state.data.expenses,exp];
  }
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}
function deleteHotel(mid,hid){
  if(!confirm("숙소를 삭제할까요?"))return;
  state.data.members=state.data.members.map(m=>m.id!==mid?m:{...m,hotels:(m.hotels||[]).filter(x=>x.id!==hid)});
  saveData(state.data);closeOverlay();
  setTimeout(()=>{const m=state.data.members.find(x=>x.id===mid);if(m)document.getElementById("body").innerHTML=renderPersonal(m);},260);
}

// ════════════════════════════════════════════════
//  PRESENCE (접속자 선택 + 동시접속 경고)
// ════════════════════════════════════════════════
let currentUser = null; // {id, name, color} — 현재 내가 누구인지

const CONCURRENT_WARNING = `⚠️ 동시 접속 주의
여러 명이 동시에 편집하면 데이터가 겹칠 수 있어요.
한 번에 한 명씩 입력하거나, 서로 다른 탭(개인)을 편집해주세요.
저장은 입력 후 1.5초 뒤 자동으로 됩니다.`;

function showPresencePicker(){
  try{ const saved=sessionStorage.getItem("jp-user"); if(saved){ currentUser=JSON.parse(saved); updatePresenceUI(); return; } }catch{}

  // ── 오늘 알림 계산 ──
  const kst=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const todayStr=`${kst.getFullYear()}-${String(kst.getMonth()+1).padStart(2,"0")}-${String(kst.getDate()).padStart(2,"0")}`;
  const todayNum=kst.getDate();
  const todayMonth=kst.getMonth()+1;

  // 취소 마감 알림: cancelBy 필드에 날짜 파싱
  const alerts=[];
  state.data.members.forEach(m=>{
    (m.hotels||[]).forEach(h=>{
      if(!h.cancelBy) return;
      // "4/7까지" "4월7일" "4/7" 등에서 월/일 파싱
      const match=h.cancelBy.match(/(\d{1,2})[\/월](\d{1,2})/);
      if(!match) return;
      const cm=parseInt(match[1]), cd=parseInt(match[2]);
      const diffDays=(new Date(2026,cm-1,cd)-new Date(2026,todayMonth-1,todayNum))/864e5;
      if(diffDays>=0 && diffDays<=3){
        const label=diffDays===0?"오늘 마감":diffDays===1?"내일 마감":`${Math.round(diffDays)}일 후 마감`;
        alerts.push({label, text:`${h.name} 취소 마감`, urgent:diffDays<=1});
      }
    });
  });

  // 날짜/시간 표시
  const dayNames=["일","월","화","수","목","금","토"];
  const dateLabel=`${todayMonth}/${todayNum}(${dayNames[kst.getDay()]}) ${String(kst.getHours()).padStart(2,"0")}:${String(kst.getMinutes()).padStart(2,"0")}`;
  const inTrip=kst>=new Date("2026-04-14")&&kst<=new Date("2026-04-22T23:59:59");
  const dayNum=inTrip?Math.floor((kst-new Date("2026-04-14"))/864e5)+1:0;

  const alertHtml=alerts.length>0?`
    <div style="margin-bottom:14px">
      ${alerts.map(a=>`<div style="display:flex;align-items:flex-start;gap:8px;
        background:${a.urgent?"#FFF0EE":"#FFF8F0"};border:1px solid ${a.urgent?"#F5C0B0":"#F0D5B0"};
        border-radius:10px;padding:9px 12px;margin-bottom:6px">
        <span style="font-size:14px;flex-shrink:0">${a.urgent?"🚨":"⚠️"}</span>
        <div>
          <div style="font-size:12px;font-weight:800;color:${a.urgent?"#B5451B":"#8B5E2E"}">${a.label}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${esc(a.text)}</div>
        </div>
      </div>`).join("")}
    </div>`:"";

  const members=state.data.members;
  const btns=members.map(m=>`
    <button onclick="selectPresence('${m.id}')"
      style="display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;
        background:var(--card);border:1.5px solid var(--border);border-radius:14px;
        margin-bottom:7px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left"
      onmouseover="this.style.borderColor='${m.color}'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="width:36px;height:36px;border-radius:50%;background:${m.color};
        display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0">
        ${m.emoji||m.name[0]}
      </div>
      <div style="text-align:left;flex:1">
        <div style="font-size:14px;font-weight:800;color:var(--dark)">${esc(m.name)}</div>
        ${(m.start&&m.end)?`<div style="font-size:11px;color:var(--text2);margin-top:1px">4/${m.start} — 4/${m.end}</div>`:""}
      </div>
      <span style="font-size:16px;color:var(--border2)">›</span>
    </button>`).join("");

  const el=document.createElement("div");
  el.id="presence-overlay";
  el.style.cssText="position:fixed;inset:0;background:rgba(28,28,26,.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;overflow-y:auto";
  el.innerHTML=`
    <div style="background:var(--bg);border-radius:24px;width:100%;max-width:380px;
      padding:24px 22px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto">
      <!-- 헤더 -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px">TOKYO · KAWAGUCHIKO</div>
          <div style="font-size:13px;font-weight:700;color:var(--dark);margin-top:2px">
            ${dateLabel}${dayNum?` · <span style="color:var(--accent)">DAY ${dayNum}</span>`:""}
          </div>
        </div>
        <span style="font-size:24px">🇯🇵</span>
      </div>
      <!-- 알림 -->
      ${alertHtml}
      <!-- 사용자 선택 -->
      <div style="font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;margin-bottom:10px">사용자 설정</div>
      ${btns}
      <!-- 경고 -->
      <div style="background:#FFF8F0;border:1px solid #F0D5B0;border-radius:10px;padding:10px 12px;margin-top:6px">
        <div style="font-size:11px;color:#8B5E2E;line-height:1.65;font-weight:600">
          ⚠️ 동시 편집 시 데이터가 겹칠 수 있어요.<br>서로 다른 탭을 편집하거나 순서대로 입력해주세요.
        </div>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function selectPresence(mid){
  const m=state.data.members.find(x=>x.id===mid);
  if(!m) return;
  currentUser={id:m.id, name:m.name, color:m.color, emoji:m.emoji||m.name[0]};
  try{ sessionStorage.setItem("jp-user", JSON.stringify(currentUser)); }catch{}
  const el=document.getElementById("presence-overlay");
  if(el) el.remove();
  // 해당 멤버 탭으로 이동
  state.tab=mid;
  render();
  updatePresenceUI();
}

function updatePresenceUI(){
  const el=document.getElementById("presence-bar");
  if(!el||!currentUser) return;
  el.innerHTML=`<span style="display:inline-flex;align-items:center;gap:5px;
    background:${currentUser.color}22;border:1px solid ${currentUser.color}44;
    border-radius:20px;padding:3px 10px 3px 5px;cursor:pointer" onclick="changeUser()" title="클릭하여 변경">
    <span style="width:18px;height:18px;border-radius:50%;background:${currentUser.color};
      display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">
      ${currentUser.emoji||currentUser.name[0]}
    </span>
    <span style="font-size:11px;font-weight:700;color:${currentUser.color}">${esc(currentUser.name)}</span>
  </span>`;
}

function changeUser(){
  try{ sessionStorage.removeItem("jp-user"); }catch{}
  currentUser=null;
  updatePresenceUI();
  showPresencePicker();
}

// ════════════════════════════════════════════════
(async function init(){
  // 1) 로컬 데이터로 일단 빠르게 렌더
  const saved = loadData();
  if(saved){
    state.data = {...DEFAULT_DATA, ...saved, expenses:saved.expenses||[], schedules:saved.schedules||{}, transport:saved.transport||[], emergency:saved.emergency||[], meals:saved.meals||{}, chat:saved.chat||[], personalTransport:saved.personalTransport||{}, calNotes:saved.calNotes||{}};
  }
  render();
  updateSyncUI();
  updatePresenceUI();

  // 2) Sheets URL 설정된 경우 → 서버에서 최신 데이터 로딩
  if(SHEETS_URL){
    await doSync(true);
  } else {
    syncState.status = "no-url";
    updateSyncUI();
  }

  // 3) 환율 로딩
  fetchFx();
  setInterval(fetchFx, 5 * 60 * 1000);

  // 4) 날씨 로딩
  fetchWeather();
  setInterval(fetchWeather, 30 * 60 * 1000); // 30분마다 갱신

  // 5) 15초마다 다른 멤버 변경사항 풀링
  startPolling();

  // 6) 접속자 닉네임 선택
  setTimeout(showPresencePicker, 500); // 앱 로딩 후 잠깐 뒤에 띄우기
})();
</script>

    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  document.getElementById("pwa-manifest").href = url;
})();

// ── Service Worker 등록 (오프라인 지원) ──
if("serviceWorker" in navigator){
  const swCode = `
    const CACHE = "japan-planner-v1";
    self.addEventListener("install", e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(["./"]).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener("activate", e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener("fetch", e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
          if(res.ok){
            const clone=res.clone();
            caches.open(CACHE).then(c=>c.put(e.request,clone));
          }
          return res;
        }).catch(()=>caches.match("./")))
      );
    });
  `;
  const blob = new Blob([swCode], {type:"text/javascript"});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── iOS: 홈화면 추가 안내 배너 (한 번만) ──
(function(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const shown = sessionStorage.getItem("pwa-banner-shown");
  if(isIOS && !isStandalone && !shown){
    sessionStorage.setItem("pwa-banner-shown","1");
    setTimeout(()=>{
      const banner = document.createElement("div");
      banner.style.cssText = `
        position:fixed;bottom:0;left:0;right:0;z-index:99999;
        background:#1C1C1A;color:#FAF7F4;
        padding:14px 18px 28px;
        border-radius:20px 20px 0 0;
        font-family:'Noto Sans KR',-apple-system,sans-serif;
        box-shadow:0 -4px 24px rgba(0,0,0,.3);
        animation:slideUp .3s ease;
      `;
      banner.innerHTML = `
        <style>@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:44px;height:44px;background:#B5451B;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px">🌸</div>
            <div>
              <div style="font-size:14px;font-weight:800">홈 화면에 추가하기</div>
              <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:2px">앱처럼 바로 실행할 수 있어요</div>
            </div>
          </div>
          <button onclick="this.closest('div[style]').remove()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;flex-shrink:0">✕</button>
        </div>
        <div style="background:rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.8;color:rgba(255,255,255,.85)">
          하단 <strong style="color:#fff">공유 버튼 □↑</strong> 탭 →<br>
          <strong style="color:#fff">홈 화면에 추가</strong> 선택
        </div>
      `;
      document.body.appendChild(banner);
      setTimeout(()=>{ if(banner.parentNode) banner.remove(); }, 8000);
    }, 1500);
  }
})();
</script>
