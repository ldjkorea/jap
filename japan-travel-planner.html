<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<!-- PWA: iOS -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="여행 플래너"/>

<!-- PWA: Android + Chrome -->
<link rel="manifest" id="pwa-manifest"/>

<!-- 테마 색 -->
<meta name="theme-color" content="#B5451B"/>
<meta name="mobile-web-app-capable" content="yes"/>

<!-- 스플래시 배경 -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>도쿄 · 가와구치코 여행 플래너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #B5451B;
    --accent: #C8956C;
    --accent2: #E8B48A;
    --jade: #2D6A4F;
    --indigo: #1D3557;
    --dark: #1C1C1A;
    --bg: #F2EDE6;
    --bg2: #EDE7DF;
    --card: #FAF7F4;
    --card2: #F5F0EB;
    --border: #E0D8CF;
    --border2: #D4CBBC;
    --text1: #1C1C1A;
    --text2: #7A6F65;
    --text3: #B0A396;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 2px 14px rgba(100,80,60,.09);
    --shadow2: 0 6px 28px rgba(100,80,60,.14);
    --shadow3: 0 1px 4px rgba(100,80,60,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* Top bar */
  #topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px 10px;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1.5px solid var(--border2);
    backdrop-filter: blur(8px);
  }
  #topbar .ttl { font-size: 11px; letter-spacing: 2.5px; font-weight: 800; color: var(--accent); }

  /* Tab bar */
  #tabbar {
    display: flex; gap: 0; padding: 0 12px;
    overflow-x: auto; border-bottom: 1.5px solid var(--border2);
    background: var(--bg2); position: sticky; top: 47px; z-index: 99;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  #tabbar::-webkit-scrollbar { display: none; }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 14px 8px;
    border: none; border-bottom: 3px solid transparent;
    background: transparent; font-size: 11px; font-weight: 700;
    cursor: pointer; color: var(--text3); white-space: nowrap; flex-shrink: 0;
    font-family: inherit; transition: all .18s; letter-spacing: .2px;
  }
  .tab-btn .tab-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .tab-btn .tab-icon { font-size: 16px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn.add-tab { color: var(--text3); font-size: 20px; }

  /* Body */
  #body { flex: 1; padding: 14px 16px 80px; max-width: 800px; margin: 0 auto; width: 100%; }

  /* Desktop: 사이드바 + 메인 레이아웃 */
  @media (min-width: 700px) {
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .two-col .full { grid-column: 1 / -1; }

    #topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 49px; }

    .app-wrap { padding-top: 49px; }

    .app-main {
      display: flex;
      min-height: calc(100vh - 49px);
    }

    #tabbar {
      flex-direction: column;
      width: 200px;
      flex-shrink: 0;
      height: calc(100vh - 49px);
      overflow-y: auto;
      overflow-x: hidden;
      border-bottom: none;
      border-right: 1.5px solid var(--border2);
      padding: 12px 0 24px;
      position: sticky;
      top: 49px;
      align-self: flex-start;
      background: var(--bg2);
      scrollbar-width: none;
    }
    #tabbar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-direction: row;
      justify-content: flex-start;
      width: 100%;
      padding: 11px 20px;
      gap: 10px;
      font-size: 13px;
      border-bottom: none !important;
      border-right: 3px solid transparent;
    }
    .tab-btn.active {
      background: var(--card);
      border-right: 3px solid var(--accent) !important;
      color: var(--accent);
    }

    #body {
      flex: 1;
      padding: 24px 40px 60px;
      max-width: none;
    }
  }

  /* ── Cards ── */
  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px 18px; border: 1px solid var(--border);
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .card-accent {
    background: var(--card); border-radius: var(--radius);
    padding: 16px 18px; border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .list-item {
    background: var(--card); border-radius: var(--radius-sm); padding: 13px 16px;
    border: 1px solid var(--border); margin-bottom: 6px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all .12s; box-shadow: var(--shadow3);
  }
  .list-item:active { background: var(--card2); transform: scale(.99); }

  /* ── Countdown ── */
  .countdown-num { font-size: 44px; font-weight: 900; color: var(--accent); line-height: 1; }
  .countdown-label { font-size: 14px; color: var(--text2); font-weight: 600; }
  .countdown-date { font-size: 12px; color: var(--text3); margin-top: 6px; }

  /* ── Sub tabs ── */
  .sub-tabs { display: flex; gap: 6px; margin: 14px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .sub-tabs::-webkit-scrollbar { display: none; }
  .sub-btn {
    padding: 8px 18px; border-radius: 24px; border: 1.5px solid var(--border2);
    background: var(--card); font-size: 12px; font-weight: 700; cursor: pointer;
    flex-shrink: 0; font-family: inherit; transition: all .15s; color: var(--text2);
    box-shadow: var(--shadow3); letter-spacing: .3px;
  }
  .sub-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(200,149,108,.35); }

  /* ── Timeline ── */
  .tl-row { display: flex; align-items: center; margin-bottom: 3px; }
  .tl-name { width: 70px; flex-shrink: 0; display: flex; align-items: center; overflow: hidden; }
  .tl-bars { display: flex; flex: 1; gap: 2px; }
  .tl-dh { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 22px; }
  .tl-cell { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 22px; }
  .tl-bar { height: 16px; width: 100%; }

  /* ── Day selector ── */
  .day-row { display: flex; gap: 5px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .day-row::-webkit-scrollbar { display: none; }
  .day-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 7px 6px 5px; border: 1px solid var(--border); background: var(--card);
    border-radius: 12px; cursor: pointer; min-width: 36px; flex-shrink: 0;
    font-family: inherit; transition: all .15s; color: var(--dark);
  }
  .day-btn.active { background: var(--dark); color: #fff; border-color: var(--dark); }
  .day-btn .day-num { font-size: 14px; font-weight: 700; }
  .day-btn .day-name { font-size: 9px; opacity: .5; }

  /* ── Timeline entry ── */
  .entry-row { display: flex; gap: 10px; min-height: 32px; }
  .entry-line { display: flex; flex-direction: column; align-items: center; width: 10px; flex-shrink: 0; padding-top: 6px; }
  .entry-dot { width: 7px; height: 7px; border-radius: 4px; background: var(--accent); flex-shrink: 0; }
  .entry-connector { width: 1.5px; flex: 1; background: #EEE; margin-top: 3px; }
  .entry-card {
    flex: 1; display: flex; justify-content: space-between; align-items: center;
    background: var(--card); padding: 8px 12px; border-radius: 11px;
    border: 1px solid var(--border); margin-bottom: 5px; font-size: 14px; font-weight: 500;
  }
  .rm-btn { border: none; background: transparent; color: #ccc; font-size: 13px; cursor: pointer; padding: 2px 5px; }

  /* ── Chips ── */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    padding: 6px 14px; border-radius: 24px; border: 1.5px solid var(--border2);
    background: var(--card2); font-size: 12px; font-weight: 700; cursor: pointer;
    flex-shrink: 0; white-space: nowrap; font-family: inherit; transition: all .15s; color: var(--text2);
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(200,149,108,.3); }

  /* ── Buttons ── */
  .btn-dash {
    width: 100%; padding: 13px; border: 2px dashed var(--border2); background: transparent;
    border-radius: 14px; font-size: 13px; font-weight: 700; color: var(--text3);
    cursor: pointer; margin-top: 6px; font-family: inherit; transition: all .15s;
    letter-spacing: .2px;
  }
  .btn-dash:active { border-color: var(--accent); color: var(--accent); background: rgba(200,149,108,.05); }
  .btn-sm {
    padding: 10px 16px; border: none; background: var(--dark); color: #FAF7F4;
    border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    font-family: inherit; letter-spacing: .2px;
  }
  .btn-pri {
    width: 100%; padding: 15px; border: none;
    background: linear-gradient(135deg, #2A2A28 0%, #1C1C1A 100%);
    color: #FAF7F4;
    border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
    font-family: inherit; transition: all .15s; letter-spacing: .4px;
    box-shadow: 0 4px 12px rgba(28,28,26,.25);
  }
  .btn-pri:active { transform: scale(.98); opacity: .9; }
  .btn-pri:disabled { opacity: .45; cursor: not-allowed; }
  .btn-dng {
    width: 100%; padding: 12px; border: none; background: transparent; color: var(--red);
    border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px;
    text-align: center; font-family: inherit;
  }
  .btn-paste {
    width: 100%; padding: 11px; border: 1px dashed #2D6A4F; background: #F0FAF4;
    border-radius: 12px; font-size: 13px; font-weight: 600; color: #2D6A4F;
    cursor: pointer; margin-bottom: 8px; text-align: center; font-family: inherit; transition: all .15s;
  }
  .btn-paste:hover { background: #E0F5EA; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 13px; font-weight: 600; letter-spacing: .2px; }

  /* ── Section header ── */
  .sec-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; margin-top: 24px;
    padding-left: 10px; border-left: 3px solid var(--accent); }
  .sec-hd-icon { font-size: 16px; }
  .sec-hd-title { font-size: 13px; font-weight: 800; letter-spacing: .6px; color: var(--text1); }
  .sec-badge { font-size: 10px; color: #fff; background: var(--accent); border-radius: 20px; padding: 2px 8px; font-weight: 800; margin-left: 2px; }

  /* ── Overlay / Sheet ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: flex-end; justify-content: center; z-index: 999;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg); border-radius: 26px 26px 0 0;
    width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
    padding-bottom: 32px; transform: translateY(30px); transition: transform .28s cubic-bezier(.32,0,.67,0);
    box-shadow: 0 -12px 48px rgba(100,80,60,.18);
  }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: #DDD; margin: 10px auto 6px; }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 22px 14px; }
  .sheet-title { font-size: 17px; font-weight: 700; }
  .sheet-body { padding: 0 22px; }
  .x-btn { border: none; background: transparent; color: #999; font-size: 20px; cursor: pointer; padding: 4px; }

  /* ── Form ── */
  .form-group { margin-bottom: 12px; }
  .lbl { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 5px; display: block; letter-spacing: .8px; text-transform: uppercase; }
  .inp {
    width: 100%; padding: 12px 15px; border: 1.5px solid var(--border2); border-radius: 12px;
    font-size: 14px; font-family: inherit; background: var(--card); outline: none;
    -webkit-appearance: none; transition: all .15s; color: var(--dark);
  }
  .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,149,108,.12); }
  textarea.inp { min-height: 72px; resize: vertical; line-height: 1.5; }
  select.inp { cursor: pointer; }

  /* ── Member dot ── */
  .dot {
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; flex-shrink: 0; line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }

  /* ── Member present badge ── */
  .member-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px 3px 5px; border-radius: 16px; font-size: 11px; font-weight: 600;
    margin: 2px;
  }

  /* ── Flight row ── */
  .flight-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ── Personal profile ── */
  .profile-card { display: flex; align-items: center; gap: 14px; }

  /* ── Add member inline ── */
  .add-row { display: flex; gap: 8px; padding: 10px 20px; background: var(--bg); }

  /* ── Loading overlay for AI ── */
  .parsing-state { text-align: center; padding: 16px 0; color: var(--text2); font-size: 14px; }

  /* ── Dot pips ── */
  .pip-row { display: flex; gap: 2px; margin-top: 2px; }
  .pip { width: 4px; height: 4px; border-radius: 2px; }

  /* ── Expense Tab ── */
  .exp-member-row {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px;
  }
  .exp-member-chip {
    display: flex; align-items: center; gap: 7px; padding: 7px 12px 7px 8px;
    border: 1.5px solid var(--border); border-radius: 14px; background: var(--card);
    cursor: pointer; font-family: inherit; transition: all .15s; text-align: left;
  }
  .exp-member-chip.active { border-width: 2px; }
  .exp-sel-btn {
    display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px 7px 8px;
    border: 1.5px solid var(--border); border-radius: 22px; background: var(--card);
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all .15s; color: var(--dark);
  }
  .exp-sel-btn.active { font-weight: 700; }
  .exp-sel-btn:active { transform: scale(.95); }

  /* ── Expense Summary Cards ── */
  .exp-sum-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 14px 16px;
    margin-bottom: 8px; cursor: default;
    transition: border-color .15s, background .15s; box-shadow: var(--shadow);
  }
  .exp-sum-member { cursor: pointer; }
  .exp-sum-member:active { background: #F5F5F5 !important; }
  .exp-sum-member.active { border-width: 2px; }
  .exp-sum-label {
    font-size: 11px; font-weight: 700; color: var(--text2);
    letter-spacing: .5px; margin-bottom: 8px;
  }
  .exp-sum-body {
    display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
  }
  .exp-sum-curs {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1;
  }
  .exp-sum-cur {
    font-size: 15px; font-weight: 800; color: var(--dark);
    background: var(--bg); border-radius: 8px; padding: 3px 8px;
  }
  .exp-sum-krw {
    font-size: 12px; font-weight: 700; color: #2D6A4F;
    white-space: nowrap; flex-shrink: 0; text-align: right;
  }

  /* ── Bubble KRW note ── */
  .exp-bubble-krw {
    font-size: 10px; color: #2D6A4F; font-weight: 700;
    background: #E8F5EE; border-radius: 6px; padding: 1px 6px;
    flex-shrink: 0;
  }

  /* ── Member Expense Rows (개인탭) ── */
  .mem-exp-row {
    display: flex; align-items: center;
    padding: 11px 14px; cursor: pointer; gap: 10px;
    transition: all .12s;
  }
  .mem-exp-row:active { background: var(--card2); transform: scale(.99); }


  /* ── Schedule Calendar ── */
  /* 시간표는 JS로 inline style 처리, 스크롤 컨테이너만 CSS */
  .sched-cal-wrap {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 8px;
  }

  /* ── Expense Chat UI ── */
  .exp-chat-wrap {
    display: flex; flex-direction: column; gap: 0; margin-bottom: 8px;
  }
  .exp-date-label {
    text-align: center; font-size: 11px; font-weight: 700; color: var(--text3);
    margin: 14px 0 6px; letter-spacing: .3px;
  }
  .exp-bubble-row {
    display: flex; justify-content: flex-start; margin-bottom: 6px; cursor: pointer;
  }
  .exp-bubble {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; padding: 10px 14px;
    max-width: 90%; min-width: 140px; transition: background .1s; box-shadow: var(--shadow);
  }
  .exp-bubble:active { background: var(--bg2); }
  .exp-bubble-top {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px;
  }
  .exp-bubble-amount {
    font-size: 16px; font-weight: 900; color: var(--dark);
  }
  .exp-bubble-desc {
    font-size: 13px; font-weight: 600; color: var(--text2);
  }
  .exp-bubble-bottom {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .exp-bubble-time {
    font-size: 10px; color: var(--text3); flex-shrink: 0;
  }

  /* ── Expense Input Bar ── */
  .exp-input-wrap {
    position: sticky; bottom: 0; background: var(--bg);
    border-top: 1px solid var(--border); padding: 10px 0 4px;
    margin: 0 -16px; padding-left: 16px; padding-right: 16px;
  }
  .exp-input-hint {
    font-size: 12px; color: var(--text2); min-height: 18px;
    margin-bottom: 6px; line-height: 1.4; padding: 0 2px;
  }
  .exp-input-row { display: flex; gap: 8px; }
  .exp-input {
    flex: 1; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: 22px; font-size: 14px; font-family: inherit;
    background: var(--card); outline: none; -webkit-appearance: none;
    transition: border-color .15s; color: var(--dark);
  }
  .exp-input:focus { border-color: var(--accent); }
  .exp-member-select {
    display: flex; gap: 6px; margin-top: 8px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 2px;
  }
  .exp-member-select::-webkit-scrollbar { display: none; }
  .exp-mbtn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--card2); font-size: 10px; font-weight: 700; cursor: pointer;
    flex-shrink: 0; font-family: inherit; color: var(--text2);
    transition: all .15s;
  }
  .exp-mbtn.active { font-weight: 800; }
  .exp-mbtn:active { transform: scale(.93); }

  /* DB Sync buttons removed — auto sync only */

  /* ── Exchange rate card ── */
  .fx-card {
    background: linear-gradient(135deg, #2A3A5C 0%, #1D3557 100%);
    border-radius: var(--radius);
    padding: 16px 18px; border: none; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 4px 20px rgba(29,53,87,.3);
  }
  .fx-header { display: flex; justify-content: space-between; align-items: center; }
  .fx-title { font-size: 11px; font-weight: 800; color: rgba(255,255,255,.6); letter-spacing: 1.5px; text-transform: uppercase; }
  .fx-updated { font-size: 10px; color: rgba(255,255,255,.4); }
  .fx-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .fx-item { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,.1); border-radius: 12px; padding: 10px 6px; border: 1px solid rgba(255,255,255,.12); }

const STORE_KEY = "japan-planner-html-v1";

// ▼ Apps Script 웹앱 URL을 여기에 붙여넣으세요
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxcgSeZOt5KnQpvpI9wOpeWZIm3Y8ZsKPIbT-ykOMrUBOvMoXFn8LGEOaDlAycURWiyug/exec";

let syncState = { status:"idle", lastSync:"", dirty:false };
let syncTimer = null;

function loadData(){
  try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):null; }
  catch{ return null; }
}
function saveLocal(d){
  try{ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }
  catch(e){ console.error(e); }
}
async function sheetsLoad(){
  if(!SHEETS_URL) return null;
  const res=await fetch(SHEETS_URL+"?action=load",{method:"GET"});
  const j=await res.json();
  return j.data?JSON.parse(j.data):null;
}
async function sheetsSave(d){
  if(!SHEETS_URL) return;
  await fetch(SHEETS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:"save",data:JSON.stringify(d)})});
}
async function doSync(forceLoad=false){
  if(!SHEETS_URL){syncState.status="no-url";updateSyncUI();return;}
  syncState.status="syncing";updateSyncUI();
  try{
    if(forceLoad){
      const remote=await sheetsLoad();
      if(remote){
        state.data={...DEFAULT_DATA,...remote};
        saveLocal(state.data);render();
      }
    } else { await sheetsSave(state.data); }
    syncState.status="ok";
    syncState.lastSync=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    syncState.dirty=false;
  }catch(e){ console.error("Sync:",e); syncState.status="error"; }
  updateSyncUI();
}
function saveData(d){
  saveLocal(d);
  syncState.dirty=true; updateSyncUI();
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>doSync(false),1500);
}
function startPolling(){
  if(!SHEETS_URL)return;
  setInterval(async()=>{
    // 사용자가 입력 중이면 폴링 스킵
    const ae=document.activeElement;
    const isTyping=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
    if(syncState.dirty||syncState.status==="syncing"||isTyping)return;
    try{
      const remote=await sheetsLoad();
      if(!remote)return;
      if(JSON.stringify(remote)!==JSON.stringify(state.data)){
        state.data={...DEFAULT_DATA,...remote};
        saveLocal(state.data);render();
        syncState.lastSync=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
        syncState.status="ok";updateSyncUI();
      }
    }catch{}
  },15000);
}
function updateSyncUI(){
  const el=document.getElementById("sync-status");
  if(!el)return;
  if(!SHEETS_URL){el.innerHTML='<span style="font-size:10px;color:var(--text3)">💾 로컬</span>';return;}
  const map={syncing:["⏳","var(--accent)"],ok:["✅","#2D6A4F"],error:["❌","var(--red)"],idle:["☁️","var(--text3)"]};
  const [icon,color]=map[syncState.status]||["☁️","var(--text3)"];
  const label=syncState.status==="ok"?syncState.lastSync:syncState.status==="syncing"?"저장 중":"";
  el.innerHTML=`<span style="font-size:11px;color:${color};font-weight:600">${icon} ${label}</span>`;
}

//  OVERLAY SYSTEM

let overlayEl=null;
function showOverlay(title,bodyHTML){
  closeOverlay();
  const el=document.createElement("div");
  el.className="overlay";
  el.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>
    <div class="sheet-head"><span class="sheet-title">${title}</span>
    <button class="x-btn" onclick="closeOverlay()">✕</button></div>
    <div class="sheet-body">${bodyHTML}</div></div>`;
  el.addEventListener("click",e=>{if(e.target===el)closeOverlay();});
  document.body.appendChild(el);
  overlayEl=el;
  requestAnimationFrame(()=>el.classList.add("open"));
}
function closeOverlay(){
  if(!overlayEl)return;
  overlayEl.classList.remove("open");
  setTimeout(()=>{if(overlayEl)overlayEl.remove();overlayEl=null;},250);
}

async function sendAiMessage(){
  const input = document.getElementById('ai-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text || aiLoading) return;
  input.value = '';
  input.style.height = 'auto';

  const msgId = uid();
  aiMessages.push({role:'user', content:text, id:msgId});
  aiLoading = true;
  document.getElementById('body').innerHTML = renderAiTab();

function applyAiAction(actions, idx){
  const action = actions[idx];
  if(!action) return;

  try {
    if(action.type === 'add_hotel'){
      const m = state.data.members.find(x=>x.id===action.memberId);
      if(!m) { alert('멤버를 찾을 수 없어요'); return; }
      const hotel = {...action.data, id: uid()};
      state.data.members = state.data.members.map(x=>
        x.id===action.memberId ? {...x, hotels:[...(x.hotels||[]), hotel]} : x
      );
    }
    else if(action.type === 'add_meal'){
      if(!state.data.meals) state.data.meals = {};
      const mid = action.memberId;
      const date = action.date;
      const mt = action.mealType; // breakfast/lunch/dinner
      if(!state.data.meals[mid]) state.data.meals[mid] = {};
      if(!state.data.meals[mid][date]) state.data.meals[mid][date] = {breakfast:'',lunch:'',dinner:''};
      state.data.meals[mid][date][mt] = action.data;
    }
    else if(action.type === 'add_transport'){
      if(!state.data.personalTransport) state.data.personalTransport = {};
      if(!state.data.personalTransport[action.memberId]) state.data.personalTransport[action.memberId] = [];
      const t = {...action.data, id: uid(),
        from: action.data.stops?.[0]?.station||'',
        to: action.data.stops?.[action.data.stops.length-1]?.station||'',
        time: action.data.stops?.[0]?.time||''};
      state.data.personalTransport[action.memberId].push(t);
    }
    else if(action.type === 'add_schedule'){
      const date = action.data.date;
      if(!state.data.schedules) state.data.schedules = {};
      if(!state.data.schedules[action.memberId]) state.data.schedules[action.memberId] = {};
      if(!state.data.schedules[action.memberId][date]) state.data.schedules[action.memberId][date] = [];
      state.data.schedules[action.memberId][date].push({...action.data, id: uid()});
    }

    saveData(state.data);

    // 버튼을 "적용됨"으로 변경
    const btn = document.getElementById(`ai-action-${actions[0]?.id||idx}-${idx}`);
    if(btn){
      btn.style.background = '#E8F5EE';
      btn.style.borderColor = '#2D6A4F';
      btn.style.color = '#2D6A4F';
      btn.innerHTML = `<span style="font-size:16px">✅</span><div><div style="font-size:12px;font-weight:800">적용 완료!</div><div style="font-size:11px;color:var(--text2)">해당 탭에서 확인하세요</div></div>`;
      btn.onclick = null;
    }
    // 전체 재렌더 없이 버튼만 업데이트
  } catch(e) {
    console.error('apply action error:', e);
    alert('적용 중 오류가 발생했어요: ' + e.message);
  }
}

function renderChatTab(){
  const msgs = (state.data.chat||[]).slice().sort((a,b)=>a.ts-b.ts);
  const members = state.data.members;

  // 메시지 목록
  let listHtml = "";
  if(msgs.length===0){
    listHtml=`<div class="empty" style="padding:32px 20px"><div style="margin-bottom:8px">${JAPAN_SVG.torii}</div>아직 메시지가 없어요<br><span style="font-size:12px;color:var(--text3);margin-top:6px;display:block">아래에서 작성해보세요</span></div>`;
  } else {
    let prevDate="";
    msgs.forEach(msg=>{
      const m=members.find(x=>x.id===msg.mid)||{name:"?",color:"#999",emoji:""};
      const d=new Date(msg.ts);
      const kst=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
      const dateStr=`${kst.getMonth()+1}/${kst.getDate()}`;
      const timeStr=`${String(kst.getHours()).padStart(2,"0")}:${String(kst.getMinutes()).padStart(2,"0")}`;
      const isMine = currentUser && msg.mid===currentUser.id;

      }

        align-items:flex-end;gap:7px;margin-bottom:10px">
        ${!isMine?`<div style="flex-shrink:0">${dot(m,28)}</div>`:""}
        <div style="max-width:75%">
          ${!isMine?`<div style="font-size:10px;font-weight:700;color:${m.color};margin-bottom:3px;padding-left:2px">${esc(m.name)}</div>`:""}

          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px;
            text-align:${isMine?"right":"left"};padding:0 4px">${timeStr}

          </div>

    const isSel = currentUser && currentUser.id===m.id;
    return `<button onclick="selectPresence('${m.id}')"
      style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 5px;

    </button>`;
  }).join("");

  return `
    <div style="display:flex;flex-direction:column;min-height:calc(100vh - 120px)">
      <!-- 메시지 목록 -->

        <!-- 작성자 선택 -->
        <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px">

            rows="1"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'"
            oninput="autoResize(this)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
          ></textarea>
          <button onclick="sendChat()"
            style="padding:10px 16px;border:none;background:var(--dark);color:#FAF7F4;

function sendChat(){
  if(!currentUser){ alert("먼저 작성자를 선택해주세요!"); return; }
  const inp=document.getElementById("chat-inp");
  const text=(inp?.value||"").trim();
  if(!text) return;
  const msg={id:uid(), ts:Date.now(), mid:currentUser.id, text};
  if(!state.data.chat) state.data.chat=[];
  state.data.chat=[...state.data.chat, msg];
  saveData(state.data);
  inp.value=""; inp.style.height="auto";
  // 재렌더 후 스크롤 맨 아래
  document.getElementById("body").innerHTML=renderChatTab();
  setTimeout(()=>{
    const list=document.getElementById("chat-list");
    if(list) list.scrollIntoView({block:"end"});
  },50);
}

function deleteChat(cid){
  if(!confirm("메시지를 삭제할까요?")) return;
  state.data.chat=(state.data.chat||[]).filter(x=>x.id!==cid);
  saveData(state.data);
  document.getElementById("body").innerHTML=renderChatTab();
}

  {name:"동준", emoji:"🧢"},

// Sheets 별도 셀에 presence 저장
async function presenceLoad(){
  if(!SHEETS_URL) return [];
  try{
    const res=await fetch(SHEETS_URL+"?action=presence",{method:"GET"});
    const j=await res.json();
    return j.presence ? JSON.parse(j.presence) : [];
  }catch{ return []; }
}
async function presenceSave(sessions){
  if(!SHEETS_URL) return;
  try{
    await fetch(SHEETS_URL,{
      method:"POST", headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"presence", data:JSON.stringify(sessions)})
    });
  }catch{}
}

// 내 heartbeat 전송 (30초마다)
async function presenceHeartbeat(){
  if(!mySession.name) return;
  mySession.ts=Date.now();
  try{
    const all=await presenceLoad();
    // 나를 업데이트하고 5분 이상 된 세션 제거
    const now=Date.now();
    const alive=all.filter(s=>s.id!==mySession.id&&(now-s.ts)<5*60*1000);
    otherSessions=alive;
    await presenceSave([...alive, mySession]);
    updatePresenceUI();
  }catch{}
}

function dot(m,size=28){
  const label=m.emoji||(m.name?m.name[0]:"?");
  const fs=m.emoji?Math.round(size*.52):Math.round(size*.42);
  return `<div class="dot" style="width:${size}px;height:${size}px;background:${m.color};font-size:${fs}px">${label}</div>`;
}
function sectionHeader(icon,title,count){
  return `<div class="sec-hd"><span class="sec-hd-icon">${icon}</span><span class="sec-hd-title">${title}</span>${count>0?`<span class="sec-badge">${count}</span>`:""}</div>`;
}
function inp(id,label,value="",placeholder="",multi=false,type="text"){
  if(multi) return `<div class="form-group"><label class="lbl">${label}</label><textarea class="inp" id="${id}" placeholder="${placeholder}">${esc(value)}</textarea></div>`;
  if(type==="select") return ""; // handled separately
  return `<div class="form-group"><label class="lbl">${label}</label><input class="inp" id="${id}" type="${type}" placeholder="${placeholder}" value="${esc(value)}"/></div>`;
}
function selectInp(id,label,value,options){
  const opts=options.map(o=>`<option value="${o.v}"${o.v==value?" selected":""}>${esc(o.l)}</option>`).join("");
  return `<div class="form-group"><label class="lbl">${label}</label><select class="inp" id="${id}">${opts}</select></div>`;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getVal(id){const el=document.getElementById(id);return el?el.value:"";}

const CURRENCIES = [
  {id:"jpy", label:"엔", symbol:"¥"},
  {id:"krw", label:"원", symbol:"₩"},
  {id:"usd", label:"달러", symbol:"$"},
];
let expFilter = "all"; // "all" | memberId

function fmtAmt(amount, currency){
  const sym = CURRENCIES.find(c=>c.id===currency)?.symbol||"";
  if(currency==="krw"||currency==="jpy") return sym+Math.round(amount).toLocaleString("ko-KR");
  return sym+amount.toFixed(2);
}

// 현재 날짜를 DAYS 중에서 찾기, 여행 전이면 첫날, 여행 후면 마지막날
function todayDate(){
  const now = new Date();
  const kst = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const ymd = `${kst.getFullYear()}-${String(kst.getMonth()+1).padStart(2,"0")}-${String(kst.getDate()).padStart(2,"0")}`;
  if(DAYS.find(d=>d.full===ymd)) return ymd;
  if(kst < new Date("2026-04-14")) return DAYS[0].full;
  return DAYS[DAYS.length-1].full;
}
function nowTime(){
  const now = new Date();
  const kst = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return `${String(kst.getHours()).padStart(2,"0")}:${String(kst.getMinutes()).padStart(2,"0")}`;
}

// ── 입력 파싱 ──
// 앞에 단위: "원 3000 택시" / "엔 500 햄버거"
// 숫자 뒤에 단위: "3000원 택시" / "500엔 햄버거" / "500 택시"(기본 엔)
// 기호: "₩3000 택시" / "¥500" / "$12"
function parseExpInput(raw){
  const text = raw.trim();
  if(!text) return null;

  // ── 1) 앞부분 기호/단어로 단위 판별 ──
  let currency = null;
  let work = text;

  const prefixMap = [
    {re:/^(₩|\\$|¥)/,        cur: t=>t==="₩"?"krw":t==="$"?"usd":"jpy"},
    {re:/^원\s*/i,            cur:()=>"krw"},
    {re:/^달러?\s*/i,         cur:()=>"usd"},
    {re:/^엔\s*/i,            cur:()=>"jpy"},
    {re:/^krw\s*/i,           cur:()=>"krw"},
    {re:/^usd\s*/i,           cur:()=>"usd"},
    {re:/^jpy\s*/i,           cur:()=>"jpy"},
  ];
  for(const p of prefixMap){
    const mm = work.match(p.re);
    if(mm){ currency=p.cur(mm[1]||mm[0]); work=work.slice(mm[0].length).trim(); break; }
  }

  // ── 2) 숫자 추출 ──
  const numMatch = work.match(/^([0-9,]+(?:\.[0-9]+)?)\s*/);
  if(!numMatch) return null;
  const amount = parseFloat(numMatch[1].replace(/,/g,""));
  if(!amount || isNaN(amount)) return null;
  work = work.slice(numMatch[0].length).trim();

  // ── 3) 숫자 뒤 단위 판별 ──
  // "달" "달러" 모두 usd / "원" krw / "엔" jpy
  if(!currency){
    const suffixMap = [
      {re:/^달러?\s*/i,    cur:"usd"},
      {re:/^원\s*/i,       cur:"krw"},
      {re:/^엔\s*/i,       cur:"jpy"},
      {re:/^usd\s*/i,      cur:"usd"},
      {re:/^krw\s*/i,      cur:"krw"},
      {re:/^jpy\s*/i,      cur:"jpy"},
      {re:/^¥\s*/,         cur:"jpy"},
    ];
    for(const s of suffixMap){
      const mm = work.match(s.re);
      if(mm){ currency=s.cur; work=work.slice(mm[0].length).trim(); break; }
    }
  }

  if(!currency) currency="jpy"; // 기본값: 엔

  const desc = work.trim() || "(내용 없음)";
  return {amount, desc, currency};
}

// ── 원화 병기 헬퍼: 엔/달러 → "≈ ₩XXX" 반환, 원화면 "" ──
function expKrwNote(amount, currency){
  if(!fxState.rates || !amount) return "";
  if(currency==="krw") return "";
  const r=fxState.rates;
  let krw=0;
  if(currency==="jpy") krw=amount*(r.krwJpy/100);
  if(currency==="usd") krw=amount*r.krwUsd;
  return "≈₩"+Math.round(krw).toLocaleString("ko-KR");
}

// ── 경비 탭 메인 렌더 ──────────────────────────
function renderExpenseTab(){
  const {data} = state;
  const expenses = (data.expenses||[]);

  // 필터
  const filtered = expFilter==="all" ? expenses
    : expenses.filter(e=>(e.memberIds||[]).includes(expFilter));

  // 멤버별 합계
  const memberTotals = {};
  data.members.forEach(m=>{ memberTotals[m.id]={jpy:0,krw:0,usd:0}; });
  expenses.forEach(e=>{
    (e.memberIds||[]).forEach(mid=>{
      if(memberTotals[mid]) memberTotals[mid][e.currency]=(memberTotals[mid][e.currency]||0)+e.splitAmount;
    });
  });

  // 전체 합계
  const totalByCur={jpy:0,krw:0,usd:0};
  expenses.forEach(e=>{ totalByCur[e.currency]=(totalByCur[e.currency]||0)+e.amount; });

  let html="";

  // ── 원화 환산 헬퍼 ──
  function toKrw(byCur){
    const r = fxState.rates;
    let total = 0;
    total += (byCur.krw||0);
    if(r){
      total += (byCur.jpy||0) * (r.krwJpy/100);
      total += (byCur.usd||0) * r.krwUsd;
    }
    return Math.round(total);
  }
  function renderCurRow(byCur){
    // 통화별 금액 나열 (0인 건 생략)
    const parts = CURRENCIES.filter(c=>byCur[c.id]>0)
      .map(c=>`<span class="exp-sum-cur">${fmtAmt(byCur[c.id],c.id)}</span>`);
    return parts.length ? parts.join("") : `<span class="exp-sum-cur" style="color:var(--text3)">0</span>`;
  }

  // 원화 환산
  const totalKrw = toKrw(totalByCur);
  const hasAny = Object.values(totalByCur).some(v=>v>0);

  // ── ① 총 사용금액 카드 (최상단) ──
  const fxMini = fxState.rates
    ? `<div style="display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.04)">
        <span style="font-size:10px;color:var(--text3)">💱 실시간</span>
        <span style="font-size:10px;color:var(--text2);font-weight:700">100엔 = ₩${fxState.rates.krwJpy.toLocaleString("ko-KR")}</span>
        <span style="font-size:10px;color:var(--text2);font-weight:700">$1 = ₩${fxState.rates.krwUsd.toLocaleString("ko-KR")}</span>
      </div>` : "";
  html+=`<div class="exp-sum-card" style="margin-bottom:12px">
    <div class="exp-sum-label">💴 총 사용금액</div>
    <div class="exp-sum-body">
      <div class="exp-sum-curs">${renderCurRow(totalByCur)}</div>
      <div class="exp-sum-krw">${hasAny&&fxState.rates?"≈ ₩"+totalKrw.toLocaleString("ko-KR"):(hasAny?"환율 로딩 중":"아직 없어요")}</div>
    </div>
    ${fxMini}
  </div>`;

  // ── ② 입력창 ──
  const dayOpts=DAYS.map(d=>({v:d.full,l:`4/${d.num}(${d.day})`}));
  html+=`<div class="exp-input-wrap" style="position:static;border-top:none;border-bottom:1px solid var(--border);margin-bottom:14px;padding-bottom:12px">
    <!-- 날짜 선택 -->
    <div style="margin-bottom:8px">
      <select id="exp-date-sel" class="inp" style="padding:8px 12px;font-size:13px;font-weight:700;color:var(--dark);background:var(--card2);border-radius:10px;border:1px solid var(--border)">
        ${dayOpts.map(o=>`<option value="${o.v}"${o.v===todayDate()?" selected":""}>${o.l}</option>`).join("")}
      </select>
    </div>
    <div class="exp-input-hint" id="exp-hint"></div>
    <div class="exp-input-row">
      <input class="exp-input" id="exp-inp" placeholder="500 햄버거 · 3000원 택시 · 12달러 커피"
        oninput="onExpInput()" onkeydown="if(event.key==='Enter')expSubmit()"/>
    </div>
    <div class="exp-member-select" id="exp-member-sel">
      ${data.members.map(m=>`<button class="exp-mbtn" id="xmb-${m.id}" onclick="toggleQuickMember('${m.id}','${m.color}')">${dot(m,22)}<span>${esc(m.name)}</span></button>`).join("")}
    </div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn-sm" style="flex:1;background:var(--dark)" onclick="expSubmit()">추가</button>
    </div>
  </div>`;

  // ── ③ 지출 내역 (날짜별 카드) ──
  if(filtered.length===0){
    html+=`<div class="empty" style="padding:32px 20px;color:var(--text3)">아직 지출 내역이 없어요<br><span style="font-size:12px;margin-top:6px;display:block">위 입력창에서 바로 추가해보세요</span></div>`;
  } else {
    const byDate={};
    filtered.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
    Object.keys(byDate).sort().forEach(date=>{
      const d=DAYS.find(x=>x.full===date);
      const dayLabel=d?`4/${d.num}일 (${d.day})`:date;
      // 날짜별 합계
      const dayTotal={jpy:0,krw:0,usd:0};
      byDate[date].forEach(e=>{ dayTotal[e.currency]=(dayTotal[e.currency]||0)+e.amount; });
      const dayTotStr=CURRENCIES.filter(c=>dayTotal[c.id]>0).map(c=>fmtAmt(dayTotal[c.id],c.id)).join(" + ");
      const sorted=[...byDate[date]].sort((a,b)=>(a.time||"").localeCompare(b.time||""));

      html+=`<div style="margin-bottom:14px">
        <!-- 날짜 헤더 -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 2px">
          <span style="font-size:12px;font-weight:800;color:var(--dark)">${dayLabel}</span>
          <span style="font-size:11px;font-weight:700;color:var(--accent)">${dayTotStr}</span>
        </div>
        <!-- 항목 카드 -->
        <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)">`;

      sorted.forEach((e,i)=>{
        const members=(e.memberIds||[]).map(mid=>data.members.find(m=>m.id===mid)).filter(Boolean);
        const isSplit=members.length>1;
        const krwNote=expKrwNote(e.amount,e.currency);
        const isLast=i===sorted.length-1;
        html+=`<div onclick="openEditExpense('${e.id}')"
          style="display:flex;align-items:center;gap:10px;padding:11px 14px;
            cursor:pointer;transition:background .12s;
            ${!isLast?"border-bottom:1px solid var(--border);":""}">
          <!-- 금액 (왼쪽 고정) -->
          <div style="flex-shrink:0;min-width:72px">
            <div style="font-size:15px;font-weight:900;color:var(--dark);line-height:1.2">${fmtAmt(e.amount,e.currency)}</div>
            ${krwNote?`<div style="font-size:10px;color:#2D6A4F;font-weight:700">${krwNote}</div>`:""}
            ${isSplit?`<div style="font-size:10px;color:var(--text3)">각 ${fmtAmt(e.splitAmount,e.currency)}</div>`:""}
          </div>
          <!-- 구분선 -->
          <div style="width:1px;height:34px;background:var(--border);flex-shrink:0"></div>
          <!-- 내용 + 멤버 -->
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.desc)}</div>
            <div style="display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap">
              ${members.map(m=>`<span style="display:inline-flex;align-items:center;gap:2px">${dot(m,14)}<span style="font-size:10px;font-weight:700;color:${m.color}">${esc(m.name)}</span></span>`).join("")}
              ${e.time?`<span style="font-size:10px;color:var(--text3);margin-left:2px">${e.time}</span>`:""}
            </div>
          </div>
          <span style="font-size:16px;color:var(--border2);flex-shrink:0">›</span>
        </div>`;
      });

      html+=`</div></div>`;
    });
  }



  return html;
}

// ── 필터 ──────────────────────────────────────
function setExpFilter(id){
  expFilter=id;
  if(state.tab==="expense") document.getElementById("body").innerHTML=renderExpenseTab();
  // 포커스 유지
  setTimeout(()=>document.getElementById("exp-inp")?.focus(),100);
}

// ── 입력 힌트 실시간 업데이트 ─────────────────
let _quickMembers=[]; // 빠른 입력에서 선택된 멤버

function onExpInput(){
  const raw=document.getElementById("exp-inp")?.value||"";
  const hint=document.getElementById("exp-hint");
  if(!hint) return;
  const parsed=parseExpInput(raw);
  if(!raw.trim()){ hint.textContent=""; return; }
  if(!parsed){ hint.innerHTML=`<span style="color:var(--red)">숫자로 시작해주세요 — 예) 500 햄버거</span>`; return; }
  const n=_quickMembers.length;
  if(n===0){ hint.innerHTML=`<span style="color:#888">${fmtAmt(parsed.amount,parsed.currency)} ${esc(parsed.desc)} — 아래서 멤버 선택</span>`; return; }
  const each=parsed.amount/n;
  const names=_quickMembers.map(mid=>state.data.members.find(m=>m.id===mid)?.name||"").join(", ");
  hint.innerHTML=`<strong>${fmtAmt(parsed.amount,parsed.currency)}</strong> ${esc(parsed.desc)} ÷ ${n}명 (${names}) = 각 <strong style="color:var(--dark)">${fmtAmt(each,parsed.currency)}</strong>`;
}

function toggleQuickMember(mid, color){
  if(_quickMembers.includes(mid)) _quickMembers=_quickMembers.filter(x=>x!==mid);
  else _quickMembers.push(mid);
  const btn=document.getElementById("xmb-"+mid);
  if(btn){
    const sel=_quickMembers.includes(mid);
    btn.classList.toggle("active",sel);
    btn.style.background=sel?color+"22":"";
    btn.style.borderColor=sel?color:"var(--border)";
  }
  onExpInput();
}

function expSubmit(){
  const raw=document.getElementById("exp-inp")?.value||"";
  const parsed=parseExpInput(raw);
  if(!parsed){ alert("금액과 내용을 입력해주세요\n예) 500 햄버거"); return; }
  if(_quickMembers.length===0){ alert("멤버를 한 명 이상 선택해주세요!"); return; }

  const date=document.getElementById('exp-date-sel')?.value||todayDate();
  const time=nowTime();
  const splitAmount=parsed.amount/_quickMembers.length;
  const exp={
    id:uid(), date, time,
    desc:parsed.desc, amount:parsed.amount, currency:parsed.currency,
    memberIds:[..._quickMembers], splitAmount
  };
  if(!state.data.expenses) state.data.expenses=[];
  state.data.expenses=[...state.data.expenses, exp];
  saveData(state.data);

  // 입력 초기화 (멤버 선택은 유지)
  const inp=document.getElementById("exp-inp");
  if(inp){ inp.value=""; inp.focus(); }
  const hint=document.getElementById("exp-hint");
  if(hint) hint.textContent="";

  // 전체 재렌더
  document.getElementById("body").innerHTML=renderExpenseTab();

function openEditExpense(eid){

function showExpenseEditForm(e){
  const dayOpts=DAYS.map(d=>({v:d.full,l:`4/${d.num} (${d.day})`}));
  const curOpts=CURRENCIES.map(c=>({v:c.id,l:c.label}));

      style="${sel?`background:${m.color};border-color:${m.color};color:#fff`:""}"
      onclick="toggleExpMember('${m.id}','${m.color}')">
      ${dot(m,18)} ${esc(m.name)}

  }).join("");

  showOverlay("경비 수정",`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div>
        <label class="lbl">날짜</label>
        <select class="inp" id="ef-date">
          ${dayOpts.map(o=>`<option value="${o.v}"${o.v===e.date?" selected":""}>${o.l}</option>`).join("")}
        </select>
      </div>
      <div>
        <label class="lbl">단위</label>
        <select class="inp" id="ef-cur">
          ${curOpts.map(o=>`<option value="${o.v}"${o.v===e.currency?" selected":""}>${o.l}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="lbl">금액</label>
      <input class="inp" id="ef-amt" type="number" inputmode="decimal" value="${esc(String(e.amount))}"/>
    </div>
    <div class="form-group">
      <label class="lbl">내용</label>
      <input class="inp" id="ef-desc" value="${esc(e.desc)}"/>
    </div>
    <div class="form-group">
      <label class="lbl">멤버</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${memberBtns}</div>
    </div>
    <div id="ef-preview" style="background:var(--bg);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:4px;min-height:36px"></div>
    <button class="btn-pri" onclick="saveExpenseEdit('${e.id}')">수정 완료</button>
    <button class="btn-dng" onclick="deleteExpense('${e.id}')">삭제</button>
  `);
  setTimeout(()=>{
    ["ef-amt","ef-cur"].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.addEventListener("input",updateExpPreview);el.addEventListener("change",updateExpPreview);}
    });
    updateExpPreview();
  },50);
}

let _expMembers=[];

function toggleExpMember(mid,color){
  if(_expMembers.includes(mid)) _expMembers=_expMembers.filter(x=>x!==mid);
  else _expMembers.push(mid);
  const btn=document.getElementById("emb-"+mid);
  if(btn){
    const sel=_expMembers.includes(mid);
    btn.className="exp-sel-btn"+(sel?" active":"");
    btn.style.cssText=sel?`background:${color};border-color:${color};color:#fff`:"";
  }
  updateExpPreview();
}

function updateExpPreview(){
  const el=document.getElementById("ef-preview");
  if(!el) return;
  const amt=parseFloat(document.getElementById("ef-amt")?.value||"0")||0;
  const cur=document.getElementById("ef-cur")?.value||"jpy";
  const n=_expMembers.length;
  if(amt<=0||n===0){el.textContent="금액과 멤버를 선택하면 미리보기가 나와요";return;}
  const each=amt/n;
  const names=_expMembers.map(mid=>state.data.members.find(m=>m.id===mid)?.name||"").filter(Boolean);
  el.innerHTML=`<strong>${fmtAmt(amt,cur)}</strong> ÷ ${n}명 (${names.join(", ")}) = 각 <strong style="color:var(--dark)">${fmtAmt(each,cur)}</strong>`;
}

function saveExpenseEdit(eid){
  const date=getVal("ef-date");
  const amount=parseFloat(getVal("ef-amt"));
  const desc=getVal("ef-desc");
  const currency=getVal("ef-cur");
  if(!amount||isNaN(amount)||!desc.trim()||_expMembers.length===0){alert("금액, 내용, 멤버를 모두 입력해주세요!");return;}
  const splitAmount=amount/_expMembers.length;
  const orig=(state.data.expenses||[]).find(x=>x.id===eid);
  const exp={...orig, date, desc:desc.trim(), amount, currency, memberIds:[..._expMembers], splitAmount};
  state.data.expenses=state.data.expenses.map(x=>x.id===eid?exp:x);
  saveData(state.data); closeOverlay();
  setTimeout(()=>{if(state.tab==="expense")document.getElementById("body").innerHTML=renderExpenseTab();},260);
}

function deleteExpense(eid){
  if(!confirm("삭제할까요?")) return;
  state.data.expenses=(state.data.expenses||[]).filter(x=>x.id!==eid);
  saveData(state.data); closeOverlay();
  setTimeout(()=>{if(state.tab==="expense")document.getElementById("body").innerHTML=renderExpenseTab();},260);
}

let weatherState = {tokyo:null, kawaguchiko:null, loading:false, updatedAt:""};

// Open-Meteo 무료 API (API키 불필요)
const WEATHER_LOCS = [
  {key:"tokyo",      name:"도쿄",       lat:35.6762, lon:139.6503},
  {key:"kawaguchiko",name:"가와구치코", lat:35.5167, lon:138.7500},
];
const WMO_DESC = {0:"맑음",1:"대체로 맑음",2:"부분 흐림",3:"흐림",
  45:"안개",48:"안개",51:"이슬비",53:"이슬비",55:"이슬비",
  61:"비",63:"비",65:"강한 비",71:"눈",73:"눈",75:"강한 눈",
  80:"소나기",81:"소나기",82:"강한 소나기",95:"뇌우",99:"뇌우"};
const WMO_EMOJI = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",
  71:"❄️",73:"❄️",75:"❄️",80:"🌦️",81:"🌦️",82:"⛈️",95:"⛈️",99:"⛈️"};

async function fetchWeather(){
  if(weatherState.loading) return;
  weatherState.loading=true;
  updateWeatherUI();
  try{
    await Promise.all(WEATHER_LOCS.map(async loc=>{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tokyo&forecast_days=3`;
      const r=await fetch(url);
      const d=await r.json();
      weatherState[loc.key]={
        temp:Math.round(d.current.temperature_2m),
        code:d.current.weathercode,
        wind:Math.round(d.current.windspeed_10m),
        daily:d.daily
      };
    }));
    const now=new Date();
    weatherState.updatedAt=now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
  }catch(e){console.error("Weather error:",e);}
  weatherState.loading=false;
  updateWeatherUI();
}

function renderWeatherCard(){
  if(weatherState.loading && !weatherState.tokyo){
    return `<div class="card" style="margin-bottom:8px"><div style="font-size:12px;color:var(--text3);text-align:center;padding:8px">날씨 불러오는 중... ☁️</div></div>`;
  }
  const locs=WEATHER_LOCS.filter(l=>weatherState[l.key]);
  if(locs.length===0) return "";

  const items=locs.map(loc=>{
    const w=weatherState[loc.key];
    const emoji=WMO_EMOJI[w.code]||"🌡️";
    const desc=WMO_DESC[w.code]||"";
    // 오늘 최고/최저
    const maxT=w.daily?Math.round(w.daily.temperature_2m_max[0]):"";
    const minT=w.daily?Math.round(w.daily.temperature_2m_min[0]):"";
    const rain=w.daily?w.daily.precipitation_probability_max[0]:"";
    return `<div style="flex:1;background:var(--bg);border-radius:12px;padding:10px 12px">
      <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">${loc.name}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-size:24px">${emoji}</span>
        <span style="font-size:22px;font-weight:900;color:var(--dark)">${w.temp}°</span>
      </div>
      <div style="font-size:11px;color:var(--text2)">${desc}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px">
        ${maxT!==""?`↑${maxT}° ↓${minT}°`:""}${rain!=""?` · 🌧️${rain}%`:""}
      </div>
    </div>`;
  }).join("");

  return `<div class="card" style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px">🌤️ 현지 날씨</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${weatherState.updatedAt?`<span style="font-size:10px;color:var(--text3)">${weatherState.updatedAt}</span>`:""}
        <button onclick="fetchWeather()" style="border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer">↻</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">${items}</div>
  </div>`;
}

function updateWeatherUI(){
  // 탭 무관하게 DOM에 있으면 업데이트
  const wrap=document.querySelector(".weather-card-wrap");
  if(wrap) wrap.innerHTML=renderWeatherCard();
}

// ════════════════════════════════════════════════
let fxState = { loading: true, error: false, updatedAt: "", rates: null };

function renderFxCard(){
  const {loading, error, rates, updatedAt} = fxState;
  let inner = "";
  if(loading){
    inner = `<div class="fx-loading">환율 불러오는 중... ⏳</div>`;
  } else if(error || !rates){
    inner = `<div class="fx-loading" style="color:var(--red)">환율을 불러오지 못했어요 <button class="fx-refresh" onclick="fetchFx()">↻ 재시도</button></div>`;
  } else {
    // KRW per 1 JPY, KRW per 1 USD, JPY per 1 USD
    const krwJpy = rates.krwJpy;   // 원/100엔
    const krwUsd = rates.krwUsd;   // 원/달러
    const jpyUsd = rates.jpyUsd;   // 엔/달러
    inner = `
      <div class="fx-row">
        <div class="fx-item">
          <span class="fx-flag">🇯🇵→🇰🇷</span>
          <span class="fx-label" style="font-size:10px">100엔 → 원</span>
          <span class="fx-val">₩${krwJpy.toLocaleString("ko-KR",{maximumFractionDigits:0})}</span>
          <span class="fx-sub">JPY/KRW</span>
        </div>
        <div class="fx-item">
          <span class="fx-flag">🇺🇸→🇰🇷</span>
          <span class="fx-label" style="font-size:10px">1달러 → 원</span>
          <span class="fx-val">₩${krwUsd.toLocaleString("ko-KR",{maximumFractionDigits:0})}</span>
          <span class="fx-sub">USD/KRW</span>
        </div>
        <div class="fx-item">
          <span class="fx-flag">🇺🇸→🇯🇵</span>
          <span class="fx-label" style="font-size:10px">1달러 → 엔</span>
          <span class="fx-val">¥${jpyUsd.toLocaleString("ko-KR",{maximumFractionDigits:1})}</span>
          <span class="fx-sub">USD/JPY</span>
        </div>
      </div>`;
  }
  return `
    <div class="fx-card">
      <div class="fx-header">
        <span class="fx-title">💱 실시간 환율</span>
        <div style="display:flex;align-items:center;gap:6px">
          ${updatedAt?`<span class="fx-updated">${updatedAt} 기준</span>`:""}
          <button class="fx-refresh" onclick="fetchFx()" title="새로고침">↻</button>
        </div>
      </div>
      ${inner}
    </div>`;
}

async function fetchFx(){
  fxState = {...fxState, loading:true, error:false};
  // Re-render just the fx card if on overview
  if(state.tab==="overview") updateFxCard();
  // 여러 무료 API 순서대로 시도 (CORS 허용)
  const FX_APIS = [
    async () => {
      const r = await fetch("https://open.er-api.com/v6/latest/USD");
      const d = await r.json();
      return { usdKrw: d.rates.KRW, usdJpy: d.rates.JPY };
    },
    async () => {
      const r = await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json");
      const d = await r.json();
      return { usdKrw: d.usd.krw, usdJpy: d.usd.jpy };
    },
    async () => {
      const r = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=KRW,JPY");
      const d = await r.json();
      return { usdKrw: d.rates.KRW, usdJpy: d.rates.JPY };
    },
    async () => {
      const [rk, rj] = await Promise.all([
        fetch("https://api.vatcomply.com/rates?base=USD"),
        fetch("https://api.vatcomply.com/rates?base=USD")
      ]);
      const dk = await rk.json();
      return { usdKrw: dk.rates.KRW, usdJpy: dk.rates.JPY };
    },
  ];
  let success = false;
  for(const api of FX_APIS) {
    try {
      const { usdKrw, usdJpy } = await api();
      if(!usdKrw || !usdJpy) continue;
      const krwJpy = (usdKrw / usdJpy) * 100;
      const now = new Date();
      fxState = {
        loading: false, error: false,
        updatedAt: now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),
        rates: { krwJpy: Math.round(krwJpy), krwUsd: Math.round(usdKrw), jpyUsd: Math.round(usdJpy*10)/10 }
      };
      success = true;
      break;
    } catch(e) { continue; }
  }
  if(!success) {
    console.error("All FX APIs failed");
    fxState = {...fxState, loading:false, error:true};
  }
  if(state.tab==="overview") updateFxCard();
}

function updateFxCard(){
  const bodyEl = document.getElementById("body");
  if(!bodyEl) return;
  // Find or replace the fx card inside overview
  const tmp = document.createElement("div");
  tmp.innerHTML = renderFxCard();
  const existing = bodyEl.querySelector(".fx-card");
  if(existing) existing.replaceWith(tmp.firstElementChild);
}

function renderTodayCard(){
  const now=new Date();
  const kst=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const start=new Date("2026-04-14T00:00:00+09:00");
  const end=new Date("2026-04-22T23:59:59+09:00");
  // 여행 중이 아니면 카드 안 보임
  if(kst<start||kst>end) return "";

  const dayNum=Math.floor((kst-start)/864e5)+1;
  const todayFull=todayDate();
  const todayDay=DAYS.find(d=>d.full===todayFull);

  // 오늘 있는 멤버
  const todayMembers=getMembersOn(state.data.members, todayDay?.num||0);

  // 오늘 교통편
  const todayTransport=(state.data.transport||[]).filter(t=>t.date===todayFull)
    .sort((a,b)=>(a.time||"").localeCompare(b.time||""));

  // 날씨 요약
  const wx=weatherState.tokyo;
  const wxEmoji=wx?(WMO_EMOJI[wx.code]||"🌡️"):"";
  const wxTemp=wx?`${wx.temp}°`:"";

  let html=`<div class="card today-card" style="margin-bottom:8px;background:linear-gradient(135deg,#1C1C1A 0%,#3D2E22 100%);color:#FAF7F4;border:none;box-shadow:var(--shadow2);position:relative;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:2px">TODAY</div>
        <div style="font-size:28px;font-weight:900;line-height:1.1">DAY ${dayNum}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:2px">4/${todayDay?.num||""}일 (${todayDay?.day||""})</div>
      </div>
      <div style="text-align:right">
        ${wxEmoji?`<div style="font-size:28px">${wxEmoji}</div><div style="font-size:16px;font-weight:700">${wxTemp}</div>`:""}
      </div>
    </div>`;

  // 오늘 멤버
  if(todayMembers.length>0){
    html+=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">`;
    todayMembers.forEach(m=>{
      html+=`<span onclick="setTab('${m.id}')" style="display:inline-flex;align-items:center;gap:5px;background:${m.color};border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer">

      </span>`;
    });
    html+=`</div>`;
  }

  // 오늘 교통편
  if(todayTransport.length>0){
    html+=`<div style="border-top:1px solid rgba(255,255,255,.1);padding-top:10px">
      <div style="font-size:10px;color:rgba(255,255,255,.4);font-weight:700;margin-bottom:6px">오늘 교통편</div>`;
    todayTransport.slice(0,3).forEach(t=>{
      const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type);
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:14px">${ty?.icon||"🚗"}</span>
        <span style="font-size:12px;color:rgba(255,255,255,.8);font-weight:600">${esc(t.from)} → ${esc(t.to)}</span>

      </div>`;
    });
    html+=`</div>`;
  }

  html+=`</div>`;
  return html;
}

    <div id="sub-content">${renderSubContent()}</div>

function renderCountdown(){
  const now=new Date(),start=new Date("2026-04-14T00:00:00+09:00"),end=new Date("2026-04-22T23:59:59+09:00"),diff=start-now;
  let inner="";
  if(diff>0){const d=Math.floor(diff/864e5);inner=`<div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px">D-DAY</div><div style="display:flex;align-items:baseline;gap:6px;margin-top:4px"><span class="countdown-num">${d}</span><span class="countdown-label">일 남음</span></div>`;}
  else if(now<=end){const day=Math.floor((now-start)/864e5)+1;inner=`<div style="font-size:22px;font-weight:800;color:var(--accent)">🇯🇵 DAY ${day}</div>`;}
  else{inner=`<div style="font-size:16px;font-weight:700;color:var(--text2)">여행 완료 ✨</div>`;}
  return `<div class="card" style="position:relative;overflow:hidden;padding-bottom:10px">
    <div style="position:absolute;right:-8px;bottom:-4px;opacity:0.18;pointer-events:none">
      ${JAPAN_SVG.fuji}
    </div>
    ${inner}
    <div class="countdown-date">2026. 4. 14 (화) — 4. 22 (수) · 8박 9일</div>
  </div>`;
}

function renderSubContent(){
  return renderTimeline();
}

// Timeline
function renderTimeline(){
  const {members}=state.data;
  let html=`<div class="card"><div class="tl-row" style="margin-bottom:6px"><div class="tl-name"></div><div class="tl-bars">`;
  DAYS.forEach(d=>{html+=`<div class="tl-dh"><span style="font-size:9px;color:#bbb">${d.day}</span><span style="font-size:11px;font-weight:700">${d.num}</span></div>`;});
  html+=`</div></div>`;
  members.forEach(m=>{
    const ok=m.start>0&&m.end>0;
    html+=`<div class="tl-row" style="margin-bottom:4px;cursor:pointer" onclick="setTab('${m.id}')"><div class="tl-name">${dot(m,17)}<span style="font-size:11px;font-weight:600;margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.name)}</span></div><div class="tl-bars">`;
    DAYS.forEach(d=>{
      const on=ok&&d.num>=m.start&&d.num<=m.end;
      const f=ok&&d.num===m.start,l=ok&&d.num===m.end;
      html+=`<div class="tl-cell"><div class="tl-bar" style="${on?`background:${m.color};opacity:.8;border-radius:${f?8:0}px ${l?8:0}px ${l?8:0}px ${f?8:0}px`:"background:transparent;border-radius:3px"}"></div></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div class="tl-row" style="margin-top:4px"><div class="tl-name" style="font-size:10px;color:#ccc">인원</div><div class="tl-bars">`;
  DAYS.forEach(d=>{const n=getMembersOn(members,d.num).length;html+=`<div class="tl-cell"><span style="font-size:10px;font-weight:700;color:${n>1?"var(--red)":n===1?"#aaa":"#e8e8e8"}">${n||""}</span></div>`;});
  html+=`</div></div></div>`;
  return html;
}

// Places
function renderPlaces(){
  const {data}=state;
  const filtered=overviewPlaceFilter==="all"?data.places:data.places.filter(p=>p.type===overviewPlaceFilter);
  let html=`<div class="chips">

  if(filtered.length===0){html+=`<div class="empty"><div style="margin-bottom:8px">${JAPAN_SVG.empty}</div>장소를 추가해보세요</div>`;}
  filtered.forEach(p=>{
    const c=PLACE_CATS.find(x=>x.id===p.type);
    const sub=[p.area,p.address].filter(Boolean).join(" · ");
    const mapQuery=encodeURIComponent([p.name,p.area,p.address].filter(Boolean).join(" "));

    html+=`<div class="list-item" style="padding:12px 14px">
      <div style="display:flex;align-items:center;gap:10px;flex:1;overflow:hidden;cursor:pointer" onclick="openEditPlace('${p.id}')">
        <span style="font-size:20px">${c?.icon||"📍"}</span>
        <div style="overflow:hidden;flex:1">
          <div style="font-size:14px;font-weight:700">${esc(p.name)}</div>
          ${sub?`<div style="font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(sub)}</div>`:""}
        </div>

      <a href="${mapUrl}" target="_blank" onclick="event.stopPropagation()"
        style="flex-shrink:0;background:#E8F4FD;border:none;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;color:#1D6FA4;text-decoration:none;display:flex;align-items:center;gap:3px">

// ════════════════════════════════════════════════
//  SCHEDULE — 시간표 캘린더 뷰
// ════════════════════════════════════════════════
const SCHED_COLORS=["#C23B22","#2D6A4F","#1D3557","#E76F51","#7B2D8B","#D4A017","#3A86A8","#8B4513"];
let _schedColor=SCHED_COLORS[0];

const CAL_HOUR_START=4, CAL_HOUR_END=26;
const PX_PER_HOUR=48;   // 1시간 높이
const COL_W=46;         // 날짜 열 너비(px)
const TIME_COL_W=24;    // 시간 눈금 열 너비

// ── 메인 렌더 ─────────────────────────────────
function renderScheduleSection(m){
  const memberDays=(m.start&&m.end)
    ? DAYS.filter(d=>d.num>=m.start&&d.num<=m.end)
    : DAYS;

  const totalHours=CAL_HOUR_END-CAL_HOUR_START;
  const gridH=totalHours*PX_PER_HOUR;
  const gridW=memberDays.length*COL_W;

  // ── 날짜 헤더 ──
  let headerHtml=`<div style="display:flex;position:sticky;top:0;z-index:10;background:var(--card2);border-bottom:1.5px solid var(--border2);width:100%">
    <div style="width:${TIME_COL_W}px;flex-shrink:0;min-width:${TIME_COL_W}px"></div>`;
  memberDays.forEach(d=>{
    const isToday=d.full===todayDate();
    headerHtml+=`<div style="flex:1;min-width:0;text-align:center;padding:6px 1px;border-left:1px solid var(--border);">
      <div style="font-size:9px;color:${isToday?"var(--red)":"var(--text3)"};font-weight:700">${d.day}</div>
      <div style="font-size:12px;font-weight:${isToday?900:700};color:${isToday?"var(--red)":"var(--dark)"};
        ${isToday?"background:#FFF0EE;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto;":""}">
        ${d.num}</div>
    </div>`;
  });
  headerHtml+=`</div>`;

  // ── 그리드 본체 ──
  let gridHtml=`<div style="display:flex;position:relative;width:100%">`;

  // 시간 눈금 열
  let rulerHtml=`<div style="width:${TIME_COL_W}px;flex-shrink:0;position:relative;height:${gridH}px;min-width:${TIME_COL_W}px">`;
  for(let h=CAL_HOUR_START;h<=CAL_HOUR_END;h++){
    const top=(h-CAL_HOUR_START)*PX_PER_HOUR;
    if(h%2===0){
      const label=h>=24?String(h-24).padStart(2,"0")+"시":String(h).padStart(2,"0");
      rulerHtml+=`<div style="position:absolute;top:${top-7}px;right:2px;font-size:8px;color:var(--text3);font-weight:700;width:${TIME_COL_W-4}px;text-align:right;letter-spacing:-.3px">${label}</div>`;
    }
  }
  rulerHtml+=`</div>`;
  gridHtml+=rulerHtml;

  // 날짜별 열
  memberDays.forEach(d=>{
    const daySchedules=((state.data.schedules||{})[m.id]||{})[d.full]||[];

    // 공통 + 개인 교통편 병합
    const commonTrans=(state.data.transport||[])
      .filter(t=>t.date===d.full)
      .map(t=>{
        const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type);
        const sh=t.time?parseInt(t.time.split(":")[0])||9:9;
        const sm=t.time?parseInt(t.time.split(":")[1])||0:0;
        const fromName=(t.from||"").replace(/역$|駅$/,"");
        const toName=(t.to||"").replace(/역$|駅$/,"");
        return{id:"tr-"+t.id,title:fromName&&toName?`${fromName} → ${toName}`:t.from||t.to||"이동",
          startH:sh,startM:sm,endH:sh+1,endM:sm,color:"#888",isTransport:true};
      });
    const personalTrans=((state.data.personalTransport||{})[m.id]||[])
      .filter(t=>t.date===d.full)
      .map(t=>{
        const ty=TRANSPORT_TYPES?.find(x=>x.id===t.type)||{icon:"🚗"};
        const stops=t.stops||[];
        const firstStop=stops[0], lastStop=stops[stops.length-1];
        const sh=firstStop?.time?parseInt(firstStop.time.split(":")[0])||9:9;
        const sm=firstStop?.time?parseInt(firstStop.time.split(":")[1])||0:0;
        const eh=lastStop?.time?parseInt(lastStop.time.split(":")[0])||(sh+1):sh+1;
        const em=lastStop?.time?parseInt(lastStop.time.split(":")[1])||0:0;
        const fromSt=(firstStop?.station||t.from||"").replace(/역$|駅$/,"");
        const toSt=(lastStop?.station||t.to||"").replace(/역$|駅$/,"");
        const title=fromSt&&toSt?`${fromSt} → ${toSt}`:(t.lineInfo||"이동");
        return{id:"pt-"+t.id,title,startH:sh,startM:sm,endH:eh,endM:em,color:"#7B6FA0",isTransport:true,isPt:true};
      });
    const transItems=[...commonTrans,...personalTrans];

    // 식사 블록 — 저장된 시간 or 기본값
    const mealItems=[];
    const dayMeals=((state.data.meals||{})[m.id]||{})[d.full]||{};
    const mealDef={b:{sh:7,sm:30,eh:8,em:30,color:"#E8A87C"},l:{sh:12,sm:0,eh:13,em:0,color:"#E8A87C"},d:{sh:18,sm:30,eh:19,em:30,color:"#C8956C"}};
    ['b','l','d'].forEach(k=>{
      const mv=dayMeals[k];
      if(!mv) return;
      // 구버전(문자열) 또는 신버전(객체) 모두 지원
      const isObj=typeof mv==='object';
      const text=isObj?mv.text:mv;
      if(!text) return;
      const def=mealDef[k];
      mealItems.push({
        id:"meal-"+k+"-"+d.full, title:text,
        startH:isObj&&mv.sh!=null?mv.sh:def.sh, startM:isObj&&mv.sm!=null?mv.sm:def.sm,
        endH:isObj&&mv.eh!=null?mv.eh:def.eh, endM:isObj&&mv.em!=null?mv.em:def.em,
        color:def.color, isMeal:true
      });
    });

    // 숙소 블록 (체크인 15시~다음날 11시 → 해당날 자정~06시는 수면바로, 낮은 짧은 블록으로)
    const hotelItems=[];
    const hotels=m.hotels||[];
    hotels.forEach(h=>{
      const ciM=h.checkin?.match(/4\/(\d+)/);
      const coM=h.checkout?.match(/4\/(\d+)/);
      if(!ciM) return;
      const ci=parseInt(ciM[1]), co=coM?parseInt(coM[1]):ci+1;
      // 체크인 당일 블록
      if(d.num===ci){
        const ciH=h.checkin?.match(/(\d+)[:시]/)?parseInt(h.checkin.match(/(\d+)[:시]/)[1]):15;
        hotelItems.push({id:"hotel-ci-"+h.id,title:h.name,startH:ciH,startM:0,endH:ciH+1,endM:0,color:"#6B9E8A",isHotel:true});
      }
      // 체크아웃 당일 블록
      if(d.num===co){
        const coH=h.checkout?.match(/(\d+)[:시]/)?parseInt(h.checkout.match(/(\d+)[:시]/)[1]):11;
        hotelItems.push({id:"hotel-co-"+h.id,title:h.name,startH:coH-1,startM:0,endH:coH,endM:0,color:"#9E6B6B",isHotel:true});
      }
    });

    // 시간 없는 일정은 시간표에서 제외
    const validSchedules=daySchedules.filter(ev=>ev.startH!=null&&ev.startH>=0);
    const allItems=[...validSchedules,...transItems,...mealItems];
    const isToday=d.full===todayDate();

    let colHtml=`<div style="flex:1;min-width:0;position:relative;height:${gridH}px;
      border-left:1px solid var(--border);background:${isToday?"#FFFBF9":"transparent"}">`;

    // 시간 눈금선
    for(let h=CAL_HOUR_START;h<=CAL_HOUR_END;h++){
      const top=(h-CAL_HOUR_START)*PX_PER_HOUR;
      colHtml+=`<div style="position:absolute;top:${top}px;left:0;right:0;height:1px;background:${h%6===0?"var(--border2)":"var(--border)"}"></div>`;
    }

    // 빈 칸 탭 영역
    for(let h=CAL_HOUR_START;h<CAL_HOUR_END;h++){
      const top=(h-CAL_HOUR_START)*PX_PER_HOUR;
      colHtml+=`<div onclick="openNewScheduleAt('${m.id}','${d.full}',${h})"
        style="position:absolute;top:${top}px;left:0;right:0;height:${PX_PER_HOUR}px;cursor:pointer;z-index:1"></div>`;
    }

    // 이벤트 블록
    allItems.forEach(ev=>{
      const startMin=(ev.startH-CAL_HOUR_START)*60+(ev.startM||0);
      const endMin=(ev.endH-CAL_HOUR_START)*60+(ev.endM||0);
      const top=Math.max(0,startMin/60*PX_PER_HOUR);
      const height=Math.max(18,(endMin-startMin)/60*PX_PER_HOUR);
      let click;
      if(ev.isPt){
        // 개인 교통편 → 교통 편집 팝업
        const ptId=ev.id.replace('pt-','');
        click=`onclick="event.stopPropagation();openEditPt('${m.id}','${ptId}')"`;
      } else if(ev.isTransport){
        // 공통 교통편 → 총괄 교통편 탭
        click=`onclick="event.stopPropagation();setSubTab('transport');setTab('overview')"`;
      } else if(ev.isHotel){
        // 숙소 블록 → 숙소 편집 팝업
        const hotelId=ev.id.replace(/^hotel-(ci|co)-/,'');
        click=`onclick="event.stopPropagation();openEditHotel('${m.id}','${hotelId}')"`;
      } else if(ev.isMeal){
        // 식사 블록 → 식사 섹션으로 스크롤 (id: meal-b-2026-04-15)
        const mealDate=ev.id.replace(/^meal-[bld]-/,'');
        click=`onclick="event.stopPropagation();scrollToMeal('${m.id}','${mealDate}')"`;
      } else {
        click=`onclick="event.stopPropagation();openEditSchedule('${m.id}','${d.full}','${ev.id}')"`;
      }
      // 블록 높이에 따라 텍스트 크기 결정 — 시간 숫자 없애고 제목만 크게
      const titleSize = height>=60?12:height>=36?11:10;
      const pad = height>=36?"4px 5px":"2px 4px";
      colHtml+=`<div ${click} style="position:absolute;top:${top+1}px;left:3px;right:3px;height:${height-2}px;
        background:${ev.color||SCHED_COLORS[0]};border-radius:8px;padding:${pad};z-index:2;
        overflow:hidden;cursor:pointer;
        box-shadow:0 2px 6px rgba(0,0,0,.18);
        display:flex;align-items:center;justify-content:center;text-align:center;">
        <div style="font-size:${titleSize}px;font-weight:800;color:#fff;
          line-height:1.3;word-break:keep-all;
          display:-webkit-box;-webkit-line-clamp:${height>=52?3:height>=36?2:1};-webkit-box-orient:vertical;overflow:hidden;">
          ${esc(stripEmoji(ev.title))}</div>
      </div>`;
    });

    colHtml+=`</div>`;
    gridHtml+=colHtml;
  });
  gridHtml+=`</div>`;

  // 현재 시간 선 (여행 중 + 오늘 포함된 경우)
  const now=new Date();
  const kst=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const todayIdx=memberDays.findIndex(d=>d.full===todayDate());
  let nowLineHtml="";
  const travelStart=new Date("2026-04-14T00:00:00+09:00");
  const travelEnd=new Date("2026-04-22T23:59:59+09:00");
  const inTrip=kst>=travelStart&&kst<=travelEnd;
  if(todayIdx>=0 && inTrip){
    const nowMin=(kst.getHours()-CAL_HOUR_START)*60+kst.getMinutes();
    if(nowMin>=0 && nowMin<=((CAL_HOUR_END-CAL_HOUR_START)*60)){
      const top=nowMin/60*PX_PER_HOUR;
      const left=TIME_COL_W+todayIdx*COL_W;
      nowLineHtml=`<div style="position:absolute;top:${top}px;left:${left}px;width:${COL_W}px;height:2px;
        background:var(--red);z-index:5;pointer-events:none">
        <div style="position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--red)"></div>
      </div>`;
    }
  }

  // ── 수면 구간 + 숙소 이름 행 ──
  // 숙소명 줄이기: 긴 이름은 앞 두 단어만
  function shortenHotelName(name){
    if(!name) return "";
    const words=name.trim().split(/\s+/);
    return words.length<=2 ? name : words.slice(0,2).join(" ");
  }

  let sleepRowHtml=`<div style="display:flex;background:var(--bg2);border-top:1.5px solid var(--border2);width:100%">
    <div style="width:${TIME_COL_W}px;flex-shrink:0;min-width:${TIME_COL_W}px;padding:5px 2px;text-align:right">
      <div style="font-size:8px;color:var(--text3);font-weight:700;line-height:1.3">🏨<br>숙소</div>
    </div>`;
  memberDays.forEach(d=>{
    const hotels=m.hotels||[];
    const hotel=hotels.find(h=>{
      const ci=h.checkinDay||0, co=h.checkoutDay||0;
      return ci>0&&co>0&&d.num>=ci&&d.num<co;
    }) || hotels.find(h=>{
      const ciM=h.checkin?.match(/4\/(\d+)/);
      const coM=h.checkout?.match(/4\/(\d+)/);
      if(!ciM) return false;
      const ci=parseInt(ciM[1]), co=coM?parseInt(coM[1]):ci;
      return d.num>=ci&&d.num<co;
    });
    const shortName=hotel?shortenHotelName(hotel.name):"";
    sleepRowHtml+=`<div style="flex:1;min-width:0;border-left:1px solid var(--border);
      padding:4px 2px;display:flex;align-items:center;justify-content:center;

        ?`<div style="font-size:9px;color:#2D6A4F;font-weight:800;text-align:center;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 3px;
            line-height:1.3;letter-spacing:-.2px">${esc(shortName)}</div>`
        :`<div style="font-size:8px;color:var(--border2);text-align:center">·</div>`}
    </div>`;
  });
  sleepRowHtml+=`</div>`;

  const totalItems=Object.values((state.data.schedules||{})[m.id]||{}).flat().length;
  const otherMembers=state.data.members.filter(x=>x.id!==m.id);
  return `
    <div style="display:flex;align-items:center;justify-content:space-between">
      ${sectionHeader("🌸","개인 일정",totalItems)}
      ${otherMembers.length>0?`<button onclick="openSyncMenu('${m.id}')"
        style="border:1px solid var(--border);background:var(--card2);border-radius:10px;
          padding:5px 10px;font-size:11px;font-weight:700;color:var(--text2);
          cursor:pointer;font-family:inherit;flex-shrink:0;margin-bottom:10px">
        🔄 동기화
      </button>`:""}
    </div>
    <!-- 시간표 -->
    <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow)">
      ${headerHtml}
      <div style="position:relative;width:100%">
        ${gridHtml}
        ${nowLineHtml}
      </div>
      <div style="width:100%">
        ${sleepRowHtml}
      </div>
    </div>
  `;
}
